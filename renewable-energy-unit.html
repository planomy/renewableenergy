SLIDES.push({ nav:'L6A — Solar Energy Pros and Cons', eyebrow:'Week 2 · Lesson 6 · Learn', eyebrowR:'Lesson 6 · Screen A', title:'Solar Energy — Pros & Cons', screenlbl:'Student screen 1 of 4', wideLeft:true, left:[{k:'read',heading:'Solar pros and cons',body:['Solar power is clean and abundant in Australia but depends on daylight and weather.','Installation cost, roof space and battery storage are common challenges.'],notice:'Key terms: efficient, disadvantage, generate.'},{k:'html', html:`<div class="card spell"><span class="tag read">SPELLING FOCUS — prefix: dis-</span><p class="spell-words"><span>dis·ad·van·tage</span><span>dis·con·nect</span><span>dis·a·gree</span></p><p class="spell-hint">dis- means "not" or "opposite." Write two more dis- words.</p></div>`}, {k:'hook', q:'Would solar panels work well where you live? What would be the advantages and challenges?'}], right:[ {k:'win15', can:'name one advantage and one challenge of solar', prove:'Link each to Australia or Queensland if you can.'},{k:'wp', list:[{t:'efficient',d:'producing results with little waste of time or energy'}, {t:'disadvantage',d:'a feature that makes something less useful or effective'}, {t:'generate',d:'to produce or create something, especially energy'}]},  {k:'img', hero:true, src:'solar-pros-cons.png', cap:'Solar Energy — Pros & Cons'}], notes:`<p>Week 2 · Lesson 6 · Learn — Solar Energy — Pros & Cons</p>` });
SLIDES.push({ nav:'L6B — Content', eyebrow:'Week 2 · Lesson 6 · Apply', eyebrowR:'Lesson 6 · Screen B', title:'Week 2 Lesson 6 — Content', screenlbl:'Student screen 2 of 4', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — </span><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "One advantage of solar energy is…"  |  "A disadvantage is that…"</p></div>`}, {k:'read', heading:'Reading', body:['Solar energy is clean, free and available across most of the world. Once panels are installed, they need little maintenance and produce no greenhouse gases. However, solar panels only generate electricity when sunlight is available — not at night or on heavily overcast days. They are costly to manufacture, and large arrays require significant land area. Despite these challenges, solar energy is one of the fastest-growing energy sources in the world today.', 'Complete a 2-column table: Advantages | Disadvantages of solar energy. List 2 of each.', 'Draft your solar energy body paragraph: topic sentence + 2 details + closing sentence.', '⭐ Challenge: Write a persuasive argument — should your school install solar panels?']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'Complete a 2-column table: Advantages | Disadvantages of solar energy. List 2 of each.'}, {t:'Report Work — Body Paragraph',d:'Draft your solar energy body paragraph: topic sentence + 2 details + closing sentence.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Write a persuasive argument — should your school install solar panels?</p></div>`}], notes:`<p>Week 2 · Lesson 6 · Apply — Week 2 Lesson 6 — Content</p>` });

SLIDES.push({ nav:'L7A — What is Wind Energy?', eyebrow:'Week 3 · Lesson 7 · Learn', eyebrowR:'Lesson 7 · Screen A', title:'What is Wind Energy?', screenlbl:'Student screen 1 of 4', wideLeft:true, left:[{k:'read',heading:'Wind energy',body:['Wind is moving air with kinetic energy; turbines convert that motion into electricity.','Coastal and open regions of Australia host large wind farms.'],notice:'Key terms: turbine, wind farm, kinetic energy.'},{k:'html', html:`<div class="card spell"><span class="tag read">SPELLING FOCUS — suffix: -ation</span><p class="spell-words"><span>ro·ta·tion</span><span>gen·er·a·tion</span><span>lo·ca·tion</span></p><p class="spell-hint">Remove -ation from each word. What verb root is left?</p></div>`}, {k:'hook', q:'Have you ever seen a wind turbine? What did it look like? Where was it?'}], right:[ {k:'win15', can:'define wind energy in my own words', prove:'Name what moves to make electricity.'},{k:'wp', list:[{t:'turbine',d:'a machine with spinning blades used to generate electricity'}, {t:'wind farm',d:'a group of wind turbines built in one location'}, {t:'kinetic energy',d:'the energy an object has because of its movement'}]},  {k:'img', hero:true, src:'wind-turbines.png', cap:'What is Wind Energy?'}], notes:`<p>Week 3 · Lesson 7 · Learn — What is Wind Energy?</p>` });
SLIDES.push({ nav:'L7B — Content', eyebrow:'Week 3 · Lesson 7 · Apply', eyebrowR:'Lesson 7 · Screen B', title:'Week 3 Lesson 7 — Content', screenlbl:'Student screen 2 of 4', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — Analyse</span><p style="margin-top:10px;font-size:16px;line-height:1.5">"Wind turbines harness the kinetic energy of moving air to generate clean electricity."</p><p style="margin-top:10px;font-size:16px;line-height:1.5">Your turn: Identify the verb group. Circle the technical terms. What is the purpose of "to generate…"?</p><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "Wind energy is produced when…"  |  "Wind turbines are used to…"</p></div>`}, {k:'read', heading:'Reading', body:['Wind is moving air. When the sun heats the Earth\'s surface unevenly, warm air rises and cooler air rushes in to replace it — creating wind. This moving air carries kinetic energy: the energy of movement. Humans have used wind energy for thousands of years in windmills. Today, modern wind turbines convert the kinetic energy of moving air into electricity, making wind one of the most affordable clean energy sources available anywhere in the world.', 'In your workbook: What is wind energy? How is wind formed? Write in your own words.', 'Add turbine, kinetic energy and wind farm to your Glossary Doc.', '⭐ Challenge: Research the world\'s largest wind farm. Report 3 facts about it.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'In your workbook: What is wind energy? How is wind formed? Write in your own words.'}, {t:'Report Work — Glossary',d:'Add turbine, kinetic energy and wind farm to your Glossary Doc.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Research the world\'s largest wind farm. Report 3 facts about it.</p></div>`}], notes:`<p>Week 3 · Lesson 7 · Apply — Week 3 Lesson 7 — Content</p>` });

SLIDES.push({ nav:'L8B — Content', eyebrow:'Week 3 · Lesson 8 · Apply', eyebrowR:'Lesson 8 · Screen B', title:'Week 3 Lesson 8 — Content', screenlbl:'Student screen 2 of 4', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — Combine</span><p style="margin-top:10px;font-size:16px;line-height:1.5">"Wind farms have many turbines." "They are built in open, windy areas."</p><p style="margin-top:10px;font-size:16px;line-height:1.5">Your turn: Use which to join these into a relative clause sentence.</p><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "A wind turbine generates electricity by…"  |  "The spinning blades…"</p></div>`}, {k:'read', heading:'Reading', body:['A wind turbine works like a giant fan in reverse: instead of using electricity to make wind, it uses wind to make electricity. Wind pushes the turbine\'s large blades, spinning a shaft connected to a generator that converts the movement into electricity. Turbines can be built onshore or offshore — offshore wind farms often produce more power because sea winds are stronger and more consistent. A single large turbine can power hundreds of homes.', 'Explain in 2–3 sentences how a wind turbine generates electricity. Use the word generator.', 'Write a topic sentence about wind energy for your report body paragraph.', '⭐ Challenge: Explain why offshore wind farms are generally more efficient than onshore ones.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'Explain in 2–3 sentences how a wind turbine generates electricity. Use the word generator.'}, {t:'Report Work — Topic Sentence',d:'Write a topic sentence about wind energy for your report body paragraph.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Explain why offshore wind farms are generally more efficient than onshore ones.</p></div>`}], notes:`<p>Week 3 · Lesson 8 · Apply — Week 3 Lesson 8 — Content</p>` });

SLIDES.push({ nav:'L9B — Content', eyebrow:'Week 3 · Lesson 9 · Apply', eyebrowR:'Lesson 9 · Screen B', title:'Week 3 Lesson 9 — Content', screenlbl:'Student screen 2 of 4', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — </span><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "One advantage of wind energy is…"  |  "However, wind energy can be…"</p></div>`}, {k:'read', heading:'Reading', body:['Wind energy is clean and emits no greenhouse gases. It is among the cheapest sources of new electricity in many countries, and once turbines are installed, the wind is free. However, wind is intermittent — turbines only generate power when wind blows at the right speed. Some communities object to turbines because of noise or visual impact on the landscape. Wind farms also require significant land or sea area to operate effectively.', 'Complete your Advantages / Disadvantages table for wind energy. List 2 of each.', 'Draft your wind energy body paragraph: topic sentence + 2 details + closing sentence.', '⭐ Challenge: Write a letter to a local council recommending wind energy for your community.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'Complete your Advantages / Disadvantages table for wind energy. List 2 of each.'}, {t:'Report Work — Body Paragraph',d:'Draft your wind energy body paragraph: topic sentence + 2 details + closing sentence.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Write a letter to a local council recommending wind energy for your community.</p></div>`}], notes:`<p>Week 3 · Lesson 9 · Apply — Week 3 Lesson 9 — Content</p>` });

SLIDES.push({ nav:'L10A — What is Hydropower?', eyebrow:'Week 4 · Lesson 10 · Learn', eyebrowR:'Lesson 10 · Screen A', title:'What is Hydropower?', screenlbl:'Student screen 1 of 4', wideLeft:true, left:[{k:'read',heading:'Hydropower',body:['Hydropower uses moving water — often stored behind dams — to spin turbines.','Australia uses hydro in snowy mountains and some river systems.'],notice:'Key terms: hydropower, dam, reservoir.'},{k:'html', html:`<div class="card spell"><span class="tag read">SPELLING FOCUS — prefix: hydro-</span><p class="spell-words"><span>hy·dro·pow·er</span><span>hy·dro·e·lec·tric</span><span>hy·dro·gen</span></p><p class="spell-hint">hydro- = water in Greek. How does each word connect to water?</p></div>`}, {k:'hook', q:'Have you ever stood near a waterfall or fast-moving river? Where does all that power come from?'}], right:[ {k:'win15', can:'define hydropower in my own words', prove:'Say what moves through the dam/turbine.'},{k:'wp', list:[{t:'hydropower',d:'electricity generated from the energy of moving water'}, {t:'dam',d:'a barrier built across a river to hold back water'}, {t:'reservoir',d:'a large artificial lake used to store water'}]},  {k:'img', hero:true, src:'hydro-dam.png', cap:'What is Hydropower?'}], notes:`<p>Week 4 · Lesson 10 · Learn — What is Hydropower?</p>` });
SLIDES.push({ nav:'L10B — Content', eyebrow:'Week 4 · Lesson 10 · Apply', eyebrowR:'Lesson 10 · Screen B', title:'Week 4 Lesson 10 — Content', screenlbl:'Student screen 2 of 4', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — Analyse</span><p style="margin-top:10px;font-size:16px;line-height:1.5">"Hydropower stations use the gravitational potential energy of water stored in large reservoirs."</p><p style="margin-top:10px;font-size:16px;line-height:1.5">Your turn: Identify the noun groups. Underline the adjectives. Circle the technical vocabulary.</p><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "Hydropower works by…"  |  "Water stored in a reservoir…"</p></div>`}, {k:'read', heading:'Reading', body:['Hydropower uses the energy of flowing or falling water to generate electricity. When rain falls on mountains, water flows downhill carrying enormous kinetic energy. Hydropower stations capture this by building a dam across a river to form a reservoir. Water stored behind the dam is released in a controlled flow through turbines, which spin generators to produce electricity. Hydropower provides about 16% of the world\'s electricity and is one of our most established renewable sources.', 'In your workbook: What is hydropower? How is it produced? Give 2 facts from the reading.', 'Add hydropower, dam and reservoir to your Glossary Doc.', '⭐ Challenge: Research which country generates the most hydropower and explain why.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'In your workbook: What is hydropower? How is it produced? Give 2 facts from the reading.'}, {t:'Report Work — Glossary',d:'Add hydropower, dam and reservoir to your Glossary Doc.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Research which country generates the most hydropower and explain why.</p></div>`}], notes:`<p>Week 4 · Lesson 10 · Apply — Week 4 Lesson 10 — Content</p>` });

SLIDES.push({ nav:'L11A — How Hydro Dams Work', eyebrow:'Week 4 · Lesson 11 · Learn', eyebrowR:'Lesson 11 · Screen A', title:'How Hydro Dams Work', screenlbl:'Student screen 1 of 4', wideLeft:true, left:[{k:'read',heading:'How hydro dams work',body:['Water high in a reservoir has gravitational potential energy; falling water spins turbines.','A penstock is a large pipe directing water to the generator.'],notice:'Key terms: potential energy, penstock, gravitational.'},{k:'html', html:`<div class="card spell"><span class="tag read">SPELLING FOCUS — suffix: -al</span><p class="spell-words"><span>grav·i·ta·tion·al</span><span>e·lec·tric·al</span><span>po·ten·tial</span></p><p class="spell-hint">-al turns a noun into an adjective. Find the noun inside each word.</p></div>`}, {k:'hook', q:'Why does water stored high up behind a dam have more energy than water at the bottom?'}], right:[ {k:'win15', can:'explain how a hydro dam makes electricity', prove:'Use water → turbine → generator.'},{k:'wp', list:[{t:'potential energy',d:'stored energy an object has because of its position'}, {t:'penstock',d:'a large pipe that carries water from a reservoir to the turbines'}, {t:'gravitational',d:'relating to the force of gravity that pulls objects downward'}]},  {k:'img', hero:true, src:'hydro-dam-cross-section.png', diagram:true, cap:'How Hydro Dams Work'}], notes:`<p>Week 4 · Lesson 11 · Learn — How Hydro Dams Work</p>` });
SLIDES.push({ nav:'L11B — Content', eyebrow:'Week 4 · Lesson 11 · Apply', eyebrowR:'Lesson 11 · Screen B', title:'Week 4 Lesson 11 — Content', screenlbl:'Student screen 2 of 4', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — Combine</span><p style="margin-top:10px;font-size:16px;line-height:1.5">"Water flows down through the dam." "It spins a turbine."</p><p style="margin-top:10px;font-size:16px;line-height:1.5">Your turn: Join using as to show the two things happen at the same time.</p><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "A hydroelectric dam generates electricity by…"  |  "Water flowing through the dam…"</p></div>`}, {k:'read', heading:'Reading', body:['Inside a hydroelectric dam, water in the reservoir holds potential energy — stored energy from its height above the turbines. When released, it flows down large pipes called penstocks, building speed as it falls. The fast-moving water spins turbines connected to generators, which convert the movement into electricity. The power travels through transmission lines to homes and businesses. After passing through the turbines, the water flows on down the river as normal.', 'Write a topic sentence about how hydro dams work. Include the term potential energy.', 'Start drafting your hydropower body paragraph — begin with your topic sentence.', '⭐ Challenge: Draw a labelled cross-section diagram of a hydroelectric dam.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'Write a topic sentence about how hydro dams work. Include the term potential energy.'}, {t:'Report Work — Body Paragraph',d:'Start drafting your hydropower body paragraph — begin with your topic sentence.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Draw a labelled cross-section diagram of a hydroelectric dam.</p></div>`}], notes:`<p>Week 4 · Lesson 11 · Apply — Week 4 Lesson 11 — Content</p>` });

SLIDES.push({ nav:'L12B — Content', eyebrow:'Week 4 · Lesson 12 · Apply', eyebrowR:'Lesson 12 · Screen B', title:'Week 4 Lesson 12 — Content', screenlbl:'Student screen 2 of 4', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — </span><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "One disadvantage of hydropower is…"  |  "Building a dam can affect…"</p></div>`}, {k:'read', heading:'Reading', body:['Hydropower is reliable and well-established — unlike solar or wind, it can generate electricity at any hour as long as water flows. Large dams can store huge amounts of energy and respond quickly to changes in demand. However, building dams has environmental costs: they flood large areas, destroy habitats and can block fish migration. Engineers today design smaller, more environmentally sensitive hydro systems to reduce these impacts wherever possible.', 'Complete your Advantages / Disadvantages table for hydropower. Add 2 of each.', 'Complete your hydropower body paragraph. Include one advantage and one disadvantage.', '⭐ Challenge: Research the Three Gorges Dam. Write 3 interesting facts about it.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'Complete your Advantages / Disadvantages table for hydropower. Add 2 of each.'}, {t:'Report Work — Body Paragraph',d:'Complete your hydropower body paragraph. Include one advantage and one disadvantage.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Research the Three Gorges Dam. Write 3 interesting facts about it.</p></div>`}], notes:`<p>Week 4 · Lesson 12 · Apply — Week 4 Lesson 12 — Content</p>` });

ly — Week 5 Lesson 13 — Content</p>` });

SLIDES.push({ nav:'L14A — How Geothermal Plants Work', eyebrow:'Week 5 · Lesson 14 · Learn', eyebrowR:'Lesson 14 · Screen A', title:'How Geothermal Plants Work', screenlbl:'Student screen 1 of 4', wideLeft:true, left:[{k:'read',heading:'How geothermal plants work',body:['Plants drill wells to reach hot water or steam that drives turbines.','Steam fields can run generators 24 hours a day where heat is close to the surface.'],notice:'Key terms: geyser, steam, drill.'},{k:'html', html:`<div class="card spell"><span class="tag read">SPELLING FOCUS — suffix: -ist</span><p class="spell-words"><span>ge·ol·o·gist</span><span>sci·en·tist</span><span>spe·cial·ist</span></p><p class="spell-hint">-ist = "a person who." What does each person study or do?</p></div>`}, {k:'hook', q:'If you could drill a well anywhere to access geothermal energy, where would you choose? Why?'}], right:[ {k:'win15', can:'explain how a geothermal plant makes electricity', prove:'Mention steam or hot water + turbine.'},{k:'wp', list:[{t:'geyser',d:'a hot spring that regularly shoots steam and water into the air'}, {t:'steam',d:'water in gas form, produced when water is heated to boiling point'}, {t:'drill',d:'to bore deep holes into the Earth\'s surface to reach hot water'}]},  {k:'img', hero:true, src:'geothermal-plant-diagram.png', diagram:true, cap:'How Geothermal Plants Work'}], notes:`<p>Week 5 · Lesson 14 · Learn — How Geothermal Plants Work</p>` });
SLIDES.push({ nav:'L14B — Content', eyebrow:'Week 5 · Lesson 14 · Apply', eyebrowR:'Lesson 14 · Screen B', title:'Week 5 Lesson 14 — Content', screenlbl:'Student screen 2 of 4', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — Combine</span><p style="margin-top:10px;font-size:16px;line-height:1.5">"Steam rises from underground." "It powers a generator."</p><p style="margin-top:10px;font-size:16px;line-height:1.5">Your turn: Use a participial phrase — start with "Steam rising from underground…"</p><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "Geothermal plants work by…"  |  "Engineers drill wells to…"</p></div>`}, {k:'read', heading:'Reading', body:['To harness geothermal energy, engineers drill deep wells into the Earth\'s crust. Hot water and steam rise through these wells from underground reservoirs. The steam spins turbines connected to generators, producing electricity. After cooling, the water is pumped back underground to be reheated — making the process very efficient. Where steam is not hot enough for electricity, heat pumps still extract warmth to heat buildings. Geothermal plants run continuously, day and night, regardless of weather conditions.', 'Write a topic sentence about how geothermal plants work. Include the word steam.', 'Start drafting your geothermal body paragraph — begin with your topic sentence.', '⭐ Challenge: Find out why Iceland can use geothermal energy so effectively.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'Write a topic sentence about how geothermal plants work. Include the word steam.'}, {t:'Report Work — Body Paragraph',d:'Start drafting your geothermal body paragraph — begin with your topic sentence.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Find out why Iceland can use geothermal energy so effectively.</p></div>`}], notes:`<p>Week 5 · Lesson 14 · Apply — Week 5 Lesson 14 — Content</p>` });

SLIDES.push({ nav:'L15A — Geothermal Pros and Cons', eyebrow:'Week 5 · Lesson 15 · Learn', eyebrowR:'Lesson 15 · Screen A', title:'Geothermal Energy — Pros & Cons', screenlbl:'Student screen 1 of 4', wideLeft:true, left:[{k:'read',heading:'Geothermal pros and cons',body:['Geothermal is reliable and low-emission but only works well in certain geology.','Drilling is expensive and not every region has accessible heat.'],notice:'Key terms: limited, volcanic, harness.'},{k:'html', html:`<div class="card spell"><span class="tag read">SPELLING FOCUS — suffix: -ic</span><p class="spell-words"><span>vol·can·ic</span><span>ge·o·ther·mic</span><span>ge·o·graph·ic</span></p><p class="spell-hint">-ic makes adjectives from nouns. What noun does each come from?</p></div>`}, {k:'hook', q:'Geothermal energy works 24 hours a day. Why is that a big advantage over solar and wind energy?'}], right:[ {k:'win15', can:'name one advantage and one challenge of geothermal', prove:'Link to location or cost once.'},{k:'wp', list:[{t:'limited',d:'restricted to certain places or amounts; not available everywhere'}, {t:'volcanic',d:'relating to or produced by a volcano or volcanic activity'}, {t:'harness',d:'to capture and control a natural force to use as energy'}]},  {k:'img', hero:true, src:'geothermal-iceland.png', cap:'Geothermal Energy — Pros & Cons'}], notes:`<p>Week 5 · Lesson 15 · Learn — Geothermal Energy — Pros & Cons</p>` });
SLIDES.push({ nav:'L15B — Content', eyebrow:'Week 5 · Lesson 15 · Apply', eyebrowR:'Lesson 15 · Screen B', title:'Week 5 Lesson 15 — Content', screenlbl:'Student screen 2 of 4', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — </span><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "An advantage of geothermal energy is…"  |  "This energy type is limited to…"</p></div>`}, {k:'read', heading:'Reading', body:['Geothermal energy is highly reliable — it runs 24 hours a day — and has a small land footprint compared to solar or wind farms. It produces very low emissions and is cost-effective once built. However, it can only be developed efficiently in areas with volcanic or tectonic activity. Drilling deep wells is expensive, and there is a small risk of triggering minor earthquakes. Despite these limits, it is a valuable part of many nations\' renewable energy mix.', 'Complete your Advantages / Disadvantages table for geothermal energy. Add 2 of each.', 'Complete your geothermal body paragraph. Include one advantage and one disadvantage.', '⭐ Challenge: Compare geothermal energy with one other renewable source of your choice.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'Complete your Advantages / Disadvantages table for geothermal energy. Add 2 of each.'}, {t:'Report Work — Body Paragraph',d:'Complete your geothermal body paragraph. Include one advantage and one disadvantage.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Compare geothermal energy with one other renewable source of your choice.</p></div>`}], notes:`<p>Week 5 · Lesson 15 · Apply — Week 5 Lesson 15 — Content</p>` });

SLIDES.push({ nav:'L16A — What is Tidal Energy?', eyebrow:'Week 6 · Lesson 16 · Learn', eyebrowR:'Lesson 16 · Screen A', title:'What is Tidal Energy?', screenlbl:'Student screen 1 of 4', wideLeft:true, left:[{k:'read',heading:'Tidal energy',body:['Tides rise and fall because of the Moon\'s and Sun\'s gravitational pull on oceans.','Tidal patterns are highly predictable compared with wind and sunshine.'],notice:'Key terms: tidal, gravitational pull, predictable.'},{k:'html', html:`<div class="card spell"><span class="tag read">SPELLING FOCUS — suffixes: -able / -ible</span><p class="spell-words"><span>pre·dict·a·ble</span><span>re·li·a·ble</span><span>pos·si·ble</span></p><p class="spell-hint">Which words use -able and which -ible? Can you find a rule?</p></div>`}, {k:'hook', q:'Have you ever watched the tide come in and go out at a beach? What do you think causes that?'}], right:[ {k:'win15', can:'define tidal energy in my own words', prove:'Say what causes the tides\' motion we capture.'},{k:'wp', list:[{t:'tidal',d:'relating to the regular rise and fall of sea levels caused by the Moon'}, {t:'gravitational pull',d:'the force of gravity attracting one large object toward another'}, {t:'predictable',d:'able to be known or expected in advance with certainty'}]},  {k:'img', hero:true, src:'tidal-energy.png', cap:'What is Tidal Energy?'}], notes:`<p>Week 6 · Lesson 16 · Learn — What is Tidal Energy?</p>` });
SLIDES.push({ nav:'L16B — Content', eyebrow:'Week 6 · Lesson 16 · Apply', eyebrowR:'Lesson 16 · Screen B', title:'Week 6 Lesson 16 — Content', screenlbl:'Student screen 2 of 4', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — Analyse</span><p style="margin-top:10px;font-size:16px;line-height:1.5">"The Moon's gravitational pull causes ocean tides, which rise and fall twice each day."</p><p style="margin-top:10px;font-size:16px;line-height:1.5">Your turn: Identify the relative clause. Underline the cause-and-effect language.</p><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "Tidal energy is caused by…"  |  "An advantage of tidal energy is…"</p></div>`}, {k:'read', heading:'Reading', body:['Tidal energy uses the power of ocean tides to generate electricity. Tides are caused by the Moon\'s gravitational pull on Earth\'s oceans. As the Moon orbits, its gravity pulls ocean water toward it, creating a high tide. As the Earth rotates, this bulge moves around the planet, producing the regular rise and fall of tides. Unlike solar and wind energy, tides are highly predictable — we can know exactly when they will occur years in advance.', 'In your workbook: What is tidal energy? What causes it? Why is it predictable?', 'Add tidal, gravitational pull and predictable to your Glossary Doc.', '⭐ Challenge: Explain why tidal energy is more predictable than solar or wind energy.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'In your workbook: What is tidal energy? What causes it? Why is it predictable?'}, {t:'Report Work — Glossary',d:'Add tidal, gravitational pull and predictable to your Glossary Doc.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Explain why tidal energy is more predictable than solar or wind energy.</p></div>`}], notes:`<p>Week 6 · Lesson 16 · Apply — Week 6 Lesson 16 — Content</p>` });

SLIDES.push({ nav:'L17A — How Tidal Energy is Captured', eyebrow:'Week 6 · Lesson 17 · Learn', eyebrowR:'Lesson 17 · Screen A', title:'How Tidal Energy is Captured', screenlbl:'Student screen 1 of 4', wideLeft:true, left:[{k:'read',heading:'How tidal energy is captured',body:['Barrages across estuaries trap tidal flow; stream generators sit in fast currents.','Engineers must balance energy gain with impacts on fisheries and navigation.'],notice:'Key terms: tidal barrage, estuary, tidal stream generator.'},{k:'html', html:`<div class="card spell"><span class="tag read">SPELLING FOCUS — suffix: -ary</span><p class="spell-words"><span>es·tu·ar·y</span><span>pri·mar·y</span><span>sec·on·dar·y</span></p><p class="spell-hint">These all end in -ary. Add two more words that use this ending.</p></div>`}, {k:'hook', q:'A tidal barrage is like a dam but uses tides. What challenges might come with building one across a river mouth?'}], right:[ {k:'win15', can:'explain one way tidal energy is captured', prove:'Name barrage, stream, or lagoon idea simply.'},{k:'wp', list:[{t:'tidal barrage',d:'a dam-like structure built across a tidal estuary to capture energy'}, {t:'estuary',d:'the wide mouth of a river where it meets the sea'}, {t:'tidal stream generator',d:'an underwater turbine placed in areas of strong tidal current'}]},  {k:'img', hero:true, src:'tidal-barrage-diagram.png', diagram:true, cap:'How Tidal Energy is Captured'}], notes:`<p>Week 6 · Lesson 17 · Learn — How Tidal Energy is Captured</p>` });
SLIDES.push({ nav:'L17B — Content', eyebrow:'Week 6 · Lesson 17 · Apply', eyebrowR:'Lesson 17 · Screen B', title:'Week 6 Lesson 17 — Content', screenlbl:'Student screen 2 of 4', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — Combine</span><p style="margin-top:10px;font-size:16px;line-height:1.5">"Tidal barrages are built across estuaries." "They capture the energy of rising and falling tides."</p><p style="margin-top:10px;font-size:16px;line-height:1.5">Your turn: Use a participial phrase: "Tidal barrages, built across estuaries, …"</p><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "A tidal barrage captures energy by…"  |  "Tidal stream generators work like…"</p></div>`}, {k:'read', heading:'Reading', body:['There are two main ways to capture tidal energy. A tidal barrage is a dam-like structure built across an estuary. As tides rise and fall, water flows through tunnels in the barrage, spinning turbines. Alternatively, tidal stream generators — turbines placed on the seabed — work like underwater wind turbines in areas of strong tidal currents. Tidal energy is still developing, but holds enormous potential for coastal nations with large tidal ranges.', 'Write a topic sentence about how tidal energy is captured. Use barrage or estuary.', 'Start drafting your tidal energy body paragraph. Begin with your topic sentence.', '⭐ Challenge: Research one real tidal energy project in the world. Write a short summary.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'Write a topic sentence about how tidal energy is captured. Use barrage or estuary.'}, {t:'Report Work — Body Paragraph',d:'Start drafting your tidal energy body paragraph. Begin with your topic sentence.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Research one real tidal energy project in the world. Write a short summary.</p></div>`}], notes:`<p>Week 6 · Lesson 17 · Apply — Week 6 Lesson 17 — Content</p>` });

SLIDES.push({ nav:'L18B — Content', eyebrow:'Week 6 · Lesson 18 · Apply', eyebrowR:'Lesson 18 · Screen B', title:'Week 6 Lesson 18 — Content', screenlbl:'Student screen 2 of 4', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — </span><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "Solar energy is best suited to…"  |  "The main difference between [X] and [Y] is…"</p></div>`}, {k:'read', heading:'Reading', body:['We have now studied five renewable energy sources: solar, wind, hydro, geothermal and tidal. Each works best in different locations: solar in sunny regions, wind in open areas, hydro near strong rivers, geothermal near volcanic zones and tidal along coastlines with large tidal ranges. No single source can meet all our needs. Energy experts recommend a "renewable energy mix" — combining multiple sources for reliable, clean electricity supply.', 'Complete your Comparison Table for all 5 types: How it works / Advantage / Disadvantage / Best location.', 'Review and complete all five body paragraph topic sentences. Share with your teacher for feedback.', '⭐ Challenge: Create an infographic comparing two energy types.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'Complete your Comparison Table for all 5 types: How it works / Advantage / Disadvantage / Best location.'}, {t:'Report Work — Review',d:'Review and complete all five body paragraph topic sentences. Share with your teacher for feedback.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Create an infographic comparing two energy types.</p></div>`}], notes:`<p>Week 6 · Lesson 18 · Apply — Week 6 Lesson 18 — Content</p>` });

SLIDES.push({ nav:'L19A — Information Report Structure', eyebrow:'Week 7 · Lesson 19 · Learn', eyebrowR:'Lesson 19 · Screen A', title:'Information Report Structure', screenlbl:'Student screen 1 of 2', wideLeft:true, left:[{k:'html', html:`<div class="card spell"><span class="tag read">SPELLING FOCUS — prefix: intro-</span><p class="spell-words"><span>in·tro·duc·tion</span><span>in·tro·duce</span><span>in·tro·vert</span></p><p class="spell-hint">intro- means "into." How does this apply to each word?</p></div>`}, {k:'hook', q:'What do you already know about information reports? What sections do they usually have?'}], right:[ {k:'win15', can:'name the main sections of an information report', prove:'List them in order.'}, {k:'wp', list:[{t:'introduction',d:'the opening section that defines and contextualises the topic'}, {t:'general statement',d:'a broad opening sentence that defines or classifies the topic'}, {t:'technical language',d:'specialist words used for a particular subject area'}]},  {k:'img', hero:true, src:'information-report-structure.png', diagram:true, cap:'Information Report Structure'}], notes:`<p>Week 7 · Lesson 19 · Learn — Information Report Structure</p>` });
SLIDES.push({ nav:'L19B — Content', eyebrow:'Week 7 · Lesson 19 · Apply', eyebrowR:'Lesson 19 · Screen B', title:'Week 7 Lesson 19 — Content', screenlbl:'Student screen 2 of 2', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — Analyse</span><p style="margin-top:10px;font-size:16px;line-height:1.5">"Renewable energy is a broad term that describes any energy source naturally replenished by the environment."</p><p style="margin-top:10px;font-size:16px;line-height:1.5">Your turn: Identify the defining relative clause. What does it do? Circle the technical language.</p><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "An information report is a type of writing that…"  |  "The three main sections are…"</p></div>`}, {k:'read', heading:'Reading', body:['An information report presents facts about a topic clearly and objectively. It uses technical language and is written in the present tense with formal language. A typical information report has three parts: an introduction that defines the topic; body paragraphs explaining different aspects in detail; and a conclusion that sums up the key points. Understanding this structure will help you plan and write your own report on renewable energy.', 'Draw the 3-part structure of an information report with labels: Introduction / Body / Conclusion.', 'Use your notes to list the sections you will include in your report. Show your plan to your teacher.', '⭐ Challenge: Find a published information report. Identify its intro, body and conclusion.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'Draw the 3-part structure of an information report with labels: Introduction / Body / Conclusion.'}, {t:'Report Work — Planning',d:'Use your notes to list the sections you will include in your report. Show your plan to your teacher.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Find a published information report. Identify its intro, body and conclusion.</p></div>`}, {k:'exit', items:['follow report structure', 'draft or revise my report', 'use formal present-tense language']}], notes:`<p>Week 7 · Lesson 19 · Apply — Week 7 Lesson 19 — Content</p>` });
SLIDES.push({ nav:'L20A — Writing an Introduction', eyebrow:'Week 7 · Lesson 20 · Learn', eyebrowR:'Lesson 20 · Screen A', title:'Writing an Introduction', screenlbl:'Student screen 1 of 2', wideLeft:true, left:[{k:'html', html:`<div class="card spell"><span class="tag read">SPELLING FOCUS — suffix: -tion</span><p class="spell-words"><span>in·tro·duc·tion</span><span>el·ab·or·a·tion</span><span>in·for·ma·tion</span></p><p class="spell-hint">Remove -tion from each word. What verb is left?</p></div>`}, {k:'hook', q:'What should the very first sentence of your report do? Why does it matter so much?'}], right:[ {k:'win15', can:'write one introduction sentence for my energy report', prove:'Include the topic and purpose.'}, {k:'wp', list:[{t:'paragraph',d:'a group of sentences about one connected idea'}, {t:'topic sentence',d:'the opening sentence of a paragraph, stating the main idea'}, {t:'elaboration',d:'adding more detail, examples or explanation to support an idea'}]},  {k:'img', hero:true, src:'topic-sentence-example.png', diagram:true, cap:'Writing an Introduction'}], notes:`<p>Week 7 · Lesson 20 · Learn — Writing an Introduction</p>` });
SLIDES.push({ nav:'L20B — Content', eyebrow:'Week 7 · Lesson 20 · Apply', eyebrowR:'Lesson 20 · Screen B', title:'Week 7 Lesson 20 — Content', screenlbl:'Student screen 2 of 2', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — Combine</span><p style="margin-top:10px;font-size:16px;line-height:1.5">"Solar energy is clean." "It does not produce harmful gases." "It can be used wherever the sun shines."</p><p style="margin-top:10px;font-size:16px;line-height:1.5">Your turn: Join all three into one fluent sentence.</p><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "Renewable energy is a broad term that…"  |  "In this report, I will discuss…"</p></div>`}, {k:'read', heading:'Reading', body:['The introduction of an information report tells the reader what the report is about. A strong introduction begins with a general statement — for example: "Renewable energy is energy drawn from sources that are naturally replenished." It then provides brief background context. Introductions should be clear and direct — two to four sentences is sufficient. Do not include personal opinion; use formal, objective language. A well-written introduction makes the reader want to read on.', 'Identify the general statement in a model introduction provided by your teacher. What makes it effective?', 'Draft your introduction (3–4 sentences): general statement + background + topics to be covered.', '⭐ Challenge: Read a published information report and evaluate the strength of its introduction.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'Identify the general statement in a model introduction provided by your teacher. What makes it effective?'}, {t:'Report Work — Draft Introduction',d:'Draft your introduction (3–4 sentences): general statement + background + topics to be covered.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Read a published information report and evaluate the strength of its introduction.</p></div>`}, {k:'exit', items:['follow report structure', 'draft or revise my report', 'use formal present-tense language']}], notes:`<p>Week 7 · Lesson 20 · Apply — Week 7 Lesson 20 — Content</p>` });
SLIDES.push({ nav:'L21A — Writing Body Paragraphs', eyebrow:'Week 7 · Lesson 21 · Learn', eyebrowR:'Lesson 21 · Screen A', title:'Writing Body Paragraphs', screenlbl:'Student screen 1 of 2', wideLeft:true, left:[{k:'html', html:`<div class="card spell"><span class="tag read">SPELLING FOCUS — prefix: con-</span><p class="spell-words"><span>con·clu·sion</span><span>com·pare</span><span>con·trast</span></p><p class="spell-hint">con- means "together" or "with." How does this apply to each word?</p></div>`}, {k:'hook', q:'Why do we need body paragraphs in an information report? What makes a body paragraph "strong"?'}], right:[ {k:'win15', can:'write one body-paragraph topic sentence', prove:'Name the energy type or idea the paragraph will cover.'}, {k:'wp', list:[{t:'conclusion',d:'the closing section that summarises the key points of a report'}, {t:'summarise',d:'to give the main points of something briefly and clearly'}, {t:'evidence',d:'facts or information that support a claim or argument'}]},  {k:'img', hero:true, src:'topic-sentence-example.png', diagram:true, cap:'Writing Body Paragraphs'}], notes:`<p>Week 7 · Lesson 21 · Learn — Writing Body Paragraphs</p>` });
SLIDES.push({ nav:'L21B — Content', eyebrow:'Week 7 · Lesson 21 · Apply', eyebrowR:'Lesson 21 · Screen B', title:'Week 7 Lesson 21 — Content', screenlbl:'Student screen 2 of 2', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — </span><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "One type of renewable energy is… It works by…"  |  "A key advantage of [X] is…"</p></div>`}, {k:'read', heading:'Reading', body:['Body paragraphs form the main part of an information report. Each paragraph focuses on one subtopic and opens with a topic sentence — a sentence telling the reader what the paragraph is about. This is followed by elaboration: facts, explanations and examples. Technical vocabulary should be used accurately. Paragraphs end with a linking sentence. Think of each body paragraph as a mini-report with a clear beginning, middle and end.', 'Practise writing one body paragraph using the TEEL structure: Topic sentence → Evidence → Explanation → Link.', 'Draft your solar energy body paragraph in full. Share with your teacher for feedback before Week 8.', '⭐ Challenge: Write a second body paragraph about another energy type of your choice.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'Practise writing one body paragraph using the TEEL structure: Topic sentence → Evidence → Explanation → Link.'}, {t:'Report Work — Draft Paragraph',d:'Draft your solar energy body paragraph in full. Share with your teacher for feedback before Week 8.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Write a second body paragraph about another energy type of your choice.</p></div>`}, {k:'exit', items:['follow report structure', 'draft or revise my report', 'use formal present-tense language']}], notes:`<p>Week 7 · Lesson 21 · Apply — Week 7 Lesson 21 — Content</p>` });

SLIDES.push({ nav:'L22A — Using the InfoReport Tool', eyebrow:'Week 8 · Lesson 22 · Learn', eyebrowR:'Lesson 22 · Screen A', title:'Using the InfoReport Tool', screenlbl:'Student screen 1 of 2', wideLeft:true, left:[{k:'html', html:`<div class="card spell"><span class="tag read">SPELLING FOCUS — suffix: -ing</span><p class="spell-words"><span>head·ing</span><span>writ·ing</span><span>or·gan·is·ing</span></p><p class="spell-hint">Does the root word change when you add -ing? Find the rule for each.</p></div>`}, {k:'hook', q:'What would you want a reader to know about renewable energy after reading your report? What is the most important message?'}], right:[ {k:'win15', can:'open the InfoReport tool and start a section', prove:'Show the section heading on screen.'}, {k:'wp', list:[{t:'structure',d:'the way a piece of writing is organised into sections'}, {t:'heading',d:'a title that introduces a section of writing'}, {t:'subheading',d:'a smaller title that introduces a subsection within a section'}]},  {k:'img', hero:true, src:'inforeport-tool-screenshot.png', diagram:true, cap:'Using the InfoReport Tool'}], notes:`<p>Week 8 · Lesson 22 · Learn — Using the InfoReport Tool</p>` });
SLIDES.push({ nav:'L22B — Content', eyebrow:'Week 8 · Lesson 22 · Apply', eyebrowR:'Lesson 22 · Screen B', title:'Week 8 Lesson 22 — Content', screenlbl:'Student screen 2 of 2', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — Analyse</span><p style="margin-top:10px;font-size:16px;line-height:1.5">"An information report begins with a general statement that defines or classifies the topic for the reader."</p><p style="margin-top:10px;font-size:16px;line-height:1.5">Your turn: What is the purpose of this sentence? Identify the defining relative clause.</p><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "Renewable energy is energy that…"  |  "This report will discuss…"</p></div>`}, {k:'read', heading:'Reading', body:['Today you begin using the InfoReport tool to write your report on renewable energy. Read each prompt carefully and use your notes from your workbook. You have studied solar, wind, hydro, geothermal and tidal energy over seven weeks. Write in the present tense, use formal language and include technical vocabulary from your glossary. Take care with your introduction — it sets the tone for your whole report.', 'Open in your browser: planomy.github.io/inforeport', 'Type your introduction into the InfoReport tool. Use your draft from Lesson 20.', '⭐ Challenge: Add an extra section about the future of renewable energy.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'Open in your browser: planomy.github.io/inforeport'}, {t:'Report Work — Introduction',d:'Type your introduction into the InfoReport tool. Use your draft from Lesson 20.'}, {t:'Open InfoReport',d:'planomy.github.io/inforeport'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Add an extra section about the future of renewable energy.</p></div>`}, {k:'exit', items:['follow report structure', 'draft SLIDES.push({ nav:'L23A — Drafting Body Sections', eyebrow:'Week 8 · Lesson 23 · Learn', eyebrowR:'Lesson 23 · Screen A', title:'Drafting Body Sections', screenlbl:'Student screen 1 of 2', wideLeft:true, left:[{k:'html', html:`<div class="card spell"><span class="tag read">SPELLING FOCUS — prefix: re-</span><p class="spell-words"><span>re·vise</span><span>re·write</span><span>re·view</span></p><p class="spell-hint">All use re- meaning "again." What is the action of each word?</p></div>`}, {k:'hook', q:'Think back over 7 weeks. What is the most interesting thing you discovered about renewable energy?'}], right:[ {k:'win15', can:'draft four sentences for one body section', prove:'Use at least two glossary words.'}, {k:'wp', list:[{t:'draft',d:'an early version of a piece of writing, not yet finished or polished'}, {t:'revise',d:'to read through and improve a piece of writing'}, {t:'proofread',d:'to check a piece of writing carefully for errors'}]},  {k:'img', hero:true, src:'renewable-energy-mix.png', cap:'Drafting Body Sections'}], notes:`<p>Week 8 · Lesson 23 · Learn — Drafting Body Sections</p>` });
SLIDES.push({ nav:'L23B — Content', eyebrow:'Week 8 · Lesson 23 · Apply', eyebrowR:'Lesson 23 · Screen B', title:'Week 8 Lesson 23 — Content', screenlbl:'Student screen 2 of 2', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — Combine</span><p style="margin-top:10px;font-size:16px;line-height:1.5">"Solar energy uses sunlight." "Wind energy uses moving air."</p><p style="margin-top:10px;font-size:16px;line-height:1.5">Your turn: Use a contrast connector — start with "While solar energy uses sunlight, …"</p><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "[Energy type] is a form of renewable energy that…"  |  "One advantage is… However, one disadvantage is…"</p></div>`}, {k:'read', heading:'Reading', body:['Your body sections are the heart of your report. Each section covers one energy type. Begin with a clear topic sentence, then elaborate — explain how it works, where it is used, and its advantages and disadvantages. Use evidence from your reading passages and technical vocabulary from your glossary. Each section should include: a topic sentence, at least two supporting details and a closing sentence.', 'Check each body section: topic sentence ✓&nbsp; 2 details ✓&nbsp; closing sentence ✓. Fix any missing parts.', 'Complete all five body sections in the InfoReport tool using your notes and paragraph drafts.', '⭐ Challenge: Include statistics and data in at least two of your body sections.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'Check each body section: topic sentence ✓&nbsp; 2 details ✓&nbsp; closing sentence ✓. Fix any missing parts.'}, {t:'Report Work — Body Sections',d:'Complete all five body sections in the InfoReport tool using your notes and paragraph drafts.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Include statistics and data in at least two of your body sections.</p></div>`}, {k:'exit', items:['follow report structure', 'draft or revise my report', 'use formal present-tense language']}], notes:`<p>Week 8 · Lesson 23 · Apply — Week 8 Lesson 23 — Content</p>` });

SLIDES.push({ nav:'L24B — Content', eyebrow:'Week 8 · Lesson 24 · Apply', eyebrowR:'Lesson 24 · Screen B', title:'Week 8 Lesson 24 — Content', screenlbl:'Student screen 2 of 2', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — </span><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "In conclusion, renewable energy is important because…"  |  "As this report has shown…"</p></div>`}, {k:'read', heading:'Reading', body:['You are almost finished — well done! Before publishing, review your work carefully. Does your introduction define renewable energy clearly? Are your facts accurate and vocabulary used correctly? Does your conclusion summarise the key points without simply repeating them? Proofread for spelling, punctuation and grammar. When satisfied, publish your report in the InfoReport tool. Your finished report shows everything you have learned over eight weeks — take pride in it!', '✅ Introduction defines renewable energy ✅ 5 body sections — one per energy type ✅ Conclusion summarises key points ✅ Technical vocabulary used correctly ✅ Proofread for spelling & grammar', 'Write your conclusion, proofread your report, then publish it at: planomy.github.io/inforeport', '⭐ Challenge: Peer-review a classmate\'s report and give two specific improvement suggestions.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'✅ Introduction defines renewable energy ✅ 5 body sections — one per energy type ✅ Conclusion summarises key points ✅ Technical vocabulary used correctly ✅ Proofread for spelling & grammar'}, {t:'Report Work — Publish!',d:'Write your conclusion, proofread your report, then publish it at: planomy.github.io/inforeport'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Peer-review a classmate\'s report and give two specific improvement suggestions.</p></div>`}, {k:'exit', items:['follow report structure', 'draft or revise my report', 'use formal present-tense language']}], notes:`<p>Week 8 · Lesson 24 · Apply — Week 8 Lesson 24 — Content</p>` });

    </div>
    <h4 style="color:var(--amber2);margin:14px 0 6px">What is my task?</h4>
    <p>Students create an <b>information report</b>, informing the audience about <b>renewable energy sources</b>.</p>
    <h4 style="color:var(--amber2);margin:16px 0 8px">What do I need to do to complete the task?</h4>
    <table class="assess-steps">
      <tr>
        <th>Plan and create a draft text</th>
        <th>Apply teacher feedback</th>
        <th>Publish</th>
      </tr>
      <tr>
        <td>Apply what you have learned about planning and writing information texts to create a multi-paragraph text which includes <b>heading and sub-heading</b>, an <b>introductory paragraph</b>, <b>body paragraphs</b> and a <b>conclusion paragraph</b>.<br><br>Use a variety of different sentence structures.<br><br>Include interesting topic-specific vocabulary.</td>
        <td>Apply written and/or oral feedback to your text, making editorial choices.</td>
        <td>Edit and proof-read final work.<br><br>The final published version should reflect changes made because of your editorial choices.<br><br>Publish using <b>Microsoft Word</b> in <b>font size 12 Arial</b>.<br><br>Your information text should be approximately <b>200–400 words</b>.<br><br>Add your Word document to <b>OneNote</b>.</td>
      </tr>
    </table>
    <p style="color:var(--ink-dim);font-size:14px;margin-top:8px"><b>Conditions:</b> Extended response 200–400 words. Short response 20–25 words per item, up to 400 words for the task.</p>
    <div class="assess-due">Due date: 28 August 2026</div>
    <h4 style="color:var(--amber2);margin:16px 0 8px">Authentication strategies</h4>
    <ul style="margin:0 0 14px 20px;color:var(--ink);font-size:14.5px;line-height:1.5">
      <li>Complete in class under supervised conditions.</li>
      <li>Submit a plan for the development of your response to your teacher.</li>
      <li>Complete work in class — your teacher will observe you and may use annotations or notes to record the development of your response.</li>
    </ul>
    <img class="assess-source" src="${ASSESS_TASK_IMG}" alt="Official assessment task — Year 5 English Information report Written">
  </div>
`;
const ASSESS_READING_PDF = 'ENG05_SA4_2026.pdf';
const ASSESS_READING = `
  <div class="assess-doc">
    <p class="assess-open"><a href="${encodeURI(ASSESS_READING_PDF)}" target="_blank" rel="noopener">↗ Open reading assessment PDF in new tab</a> — print or save</p>
    <h3 style="margin-top:0;color:var(--mint)">Year 5 English — Reading Assessment</h3>
    <p style="color:var(--ink-dim);margin-bottom:10px">Brisbane School of Distance Education · Term 3 · Renewable Energy</p>
    <h4 style="color:var(--amber2);margin:14px 0 6px">What is my task?</h4>
    <p>Students read a text about <b>renewable energy sources</b>. They respond to short-answer questions about content and identify <b>language features</b> and <b>persuasive techniques</b> used by the author.</p>
    <p style="color:var(--ink-dim);font-size:14px;margin-top:8px"><b>Conditions:</b> Extended response 200–400 words. Short response 20–25 words per item, up to 400 words for the task.</p>
    <p style="color:var(--ink);font-size:14.5px;margin-top:10px">The PDF includes <b>vocabulary</b>, <b>sentence-level writing</b>, and <b>text comprehension</b> questions, plus the official <b>A–E marking guide</b> (pages 7–9).</p>
    <div class="assess-pdfFrame"><iframe src="${encodeURI(ASSESS_READING_PDF)}" title="Reading assessment — ENG05 SA4 2026"></iframe></div>
  </div>
`;
const ASSESS_GUIDE = `
  <p><b>Report task</b> — judged against these criteria. Aim for the <b>A</b> column! The <b>Reading</b> tab includes the official A–E descriptors for the reading assessment.</p>
  <table class="rubric">
    <tr><th>Criterion</th><th class="A">A</th><th>B</th><th>C</th><th>D</th><th>E</th></tr>
    <tr><td>Text structure &amp; organisation</td>
      <td class="A">clear, logical structure with introduction, body sections and conclusion; effective headings and subheadings</td>
      <td>clear structure with most sections present; appropriate headings</td>
      <td>recognisable report structure with some sections</td>
      <td>partial structure; sections may be incomplete</td>
      <td>limited structure; ideas not clearly grouped</td></tr>
    <tr><td>Language features</td>
      <td class="A">precise technical vocabulary used accurately; formal, objective present-tense language throughout</td>
      <td>technical vocabulary mostly accurate; formal language with minor lapses</td>
      <td>some technical vocabulary; mostly formal language</td>
      <td>limited technical vocabulary; informal language at times</td>
      <td>minimal technical vocabulary; informal or inconsistent language</td></tr>
    <tr><td>Content knowledge</td>
      <td class="A">accurate, detailed information on five renewable energy types; advantages and disadvantages explained with evidence</td>
      <td>accurate information on most energy types with some detail</td>
      <td>basic accurate information on renewable energy types</td>
      <td>partial or general information; some inaccuracies</td>
      <td>minimal or inaccurate information</td></tr>
    <tr><td>Editing &amp; publishing</td>
      <td class="A">thoroughly proofread; spelling, punctuation and grammar accurate; 200–400 words; published in Word (12pt Arial) and submitted in OneNote; reflects teacher feedback</td>
      <td>mostly accurate editing; Word document submitted in OneNote; within word range</td>
      <td>some editing evident; report submitted</td>
      <td>limited editing; draft quality or incomplete submission</td>
      <td>minimal editing or not submitted</td></tr>
  </table>
`;
const ASSESS_TAB_BY_NAV = {
  'L19A — Information Report Structure': 'task',
  'L19B — Content': 'task',
  'L20A — Writing an Introduction': 'task',
  'L20B — Content': 'task',
  'L21A — Writing Body Paragraphs': 'task',
  'L21B — Content': 'task',
  'L22A — Using the InfoReport Tool': 'task',
  'L22B — Content': 'task',
  'L23A — Drafting Body Sections': 'task',
  'L23B — Content': 'task',
  'L24A — Reviewing and Publishing': 'task',
  'L24B — Content': 'task',
  '★ Report assessment (Week 8)': 'task'
};
const INFOREPORT_NAV = new Set([
  'L19A — Information Report Structure','L19B — Content',
  'L20A — Writing an Introduction','L20B — Content',
  'L21A — Writing Body Paragraphs','L21B — Content',
  'L22A — Using the InfoReport Tool','L22B — Content',
  'L23A — Drafting Body Sections','L23B — Content',
  'L24A — Reviewing and Publishing','L24B — Content',
  '★ Report assessment (Week 8)'
]);

function hook(q){ return `<div class="hook"><div class="lbl">Warm-up — discuss with your teacher</div><p>${q}</p></div>`; }
function bq(arr){
  return `<div class="brain"><div class="lbl">💬 Discussion starters — talk it out</div>
    <ol>${arr.map((q,i)=>`<li><span class="n">${i+1}</span><span>${q}</span></li>`).join('')}</ol></div>`;
}
function wordpower(list){
  return `<div class="card dark wp"><h4>Word Work — Vocabulary</h4><div class="wp-grid">${
    list.map(w=>`<div class="chip"><b>${w.t}</b><span>${w.d}</span></div>`).join('')}</div></div>`;
}
function readCard(r){
  return `<div class="card cream"><span class="tag ${r.wow?'wow':'read'}">${r.label||(r.wow?'WOW · READ':'READ')}</span>
    <h3>${r.heading}</h3>${(r.body||[]).map(p=>`<p style="margin-bottom:10px">${p}</p>`).join('')}
    ${r.notice?`<div class="notice"><b>Notice:</b> ${r.notice}</div>`:''}</div>`;
}

function win15(b){
  return `<div class="win15"><div class="lbl">⏱ By 15 minutes · demonstrable win</div>
    <p class="can">I can ${b.can}</p>
    <p class="prove"><b>Prove it:</b> ${b.prove}</p></div>`;
}


function knowCard(k){
  const body=(k.body||[]).map(p=>`<p style="margin-bottom:8px;line-height:1.4">${p}</p>`).join('');
  const pts=(k.points||[]).map(p=>`<li>${p}</li>`).join('');
  return `<div class="card cream know-card"><span class="tag read">${k.label||'KNOWLEDGE'}</span>
    ${k.heading?`<h3>${k.heading}</h3>`:''}${body}
    ${pts?`<ul class="know-list">${pts}</ul>`:''}
    ${k.fact?`<div class="notice"><b>Key idea:</b> ${k.fact}</div>`:''}</div>`;
}
function discussCard(d){
  return `<div class="card dark discuss-card"><span class="tag try">${d.label||'DISCUSS'}</span>
    <h3>${d.title||'Talk it through'}</h3>
    <ul class="discuss-list">${(d.prompts||[]).map((p,i)=>`<li><span class="n">${i+1}</span><span>${p}</span></li>`).join('')}</ul>
    ${d.tip?`<p class="discuss-tip">${d.tip}</p>`:''}</div>`;
}

function exitCheck(items){
  return `<div class="exit"><h4>Exit check — I can…</h4><div class="exit-grid">${
    items.map(i=>`<div class="echk"><span class="bx">✓</span><span>${i}</span></div>`).join('')}</div></div>`;
}
function steps(s){
  return `<div class="steps"><span class="tag do">${s.label||'DO THIS'}</span>
    ${s.rows.map((r,i)=>`<div class="row"><div class="num">${i+1}</div><div><b>${r.t}</b><span>${r.d||''}</span></div></div>`).join('')}</div>`;
}
function engItems(s){
  return s.split(' · ').map(x=>`<span class="eng-item">${x}</span>`).join('');
}
function engBlock(a,b){
  return `<div class="eng-wrap">${a?`<div class="blk"><b>A</b><div class="eng-row">${engItems(a)}</div></div>`:''}${b?`<div class="blk"><b>B</b><div class="eng-row">${engItems(b)}</div></div>`:''}</div>`;
}
function progressionTable(rows){
  const counts={};
  rows.forEach(r=>{ counts[r.week]=(counts[r.week]||0)+1; });
  const seen=new Set();
  const body=rows.map(r=>{
    let wk='';
    if(!seen.has(r.week)){ wk=`<td class="wk" rowspan="${counts[r.week]}">Week ${r.week}</td>`; seen.add(r.week); }
    const eng = engBlock(r.englishA||r.english||'', r.englishB||'');
    return `<tr>${wk}<td class="ln">${r.n}</td><td class="topic">${r.topic}</td><td class="eng-td">${eng}</td><td class="learn">${r.learn}</td><td class="rpt">${r.report||''}</td></tr>`;
  }).join('');
  return `<div class="overview-wrap"><table class="unit-map"><thead><tr>
    <th>Wk</th><th>#</th><th>Lesson focus</th><th>English work</th><th>You'll learn</th><th>Report work</th>
  </tr></thead><tbody>${body}</tbody></table></div>`;
}
function renderBlock(b){
  switch(b.k){
    case 'read': return readCard(b);
    case 'hook': return hook(b.q);
    case 'brain': return bq(b.q);
    case 'wp': return wordpower(b.list);
    case 'steps': return steps(b);
    case 'win15': return win15(b);
    case 'know': return knowCard(b);
    case 'discuss': return discussCard(b);
    case 'exit': return exitCheck(b.items);
    case 'img': return `<div class="imgframe${b.hero?' hero':''}${b.diagram?' diagram':''}${b.fit?' fit':''}"><img src="${b.src}" alt="${b.alt||''}" loading="lazy" onerror="this.style.opacity='0.3'">${b.cap?`<div class="cap">${b.cap}</div>`:''}</div>`;
    case 'html': return b.html;
    default: return '';
  }
}
function renderSlide(s){
  const el = document.getElementById('slide');
  el.className = 'slide ' + (s.type||'lesson');
  el.style.background = '';
  if(s.type==='cover' && s.bg){
    el.style.background = `linear-gradient(90deg, rgba(6,19,24,.95) 30%, rgba(6,19,24,.45) 70%, rgba(6,19,24,.25)), url('${s.bg}') right center / cover no-repeat`;
  }
  let html='';
  if(s.eyebrowR) html+=`<div class="eyebrow-r">${s.eyebrowR}</div>`;
  if(s.type==='cover'){
    html += `<span class="eyebrow">${s.eyebrow||''}</span><h1 class="title">${s.title}</h1><p class="sub">${s.sub||''}</p>`;
  } else if(s.type==='divider'){
    html += `<div class="pkr">${s.eyebrow||''}</div><h1>${s.title}</h1>
      <div class="goals">${(s.goals||[]).map((g,i)=>`<div class="goal"><i style="background:var(--p${(i%5)+1})">${i+1}</i><span>${g}</span></div>`).join('')}</div>`;
  } else if(s.type==='checkpoint'){
    html += `<span class="eyebrow" style="align-self:center">${s.eyebrow||''}</span><h1>${s.title}</h1><p>${s.sub||''}</p>
      <button class="btn assess" style="padding:14px 26px;font-size:17px" onclick="openOverlay()">📋 Open assessment task</button>`;
  } else if(s.type==='overview'){
    if(s.eyebrow) html+=`<span class="eyebrow">${s.eyebrow}</span>`;
    html += `<h1 class="title">${s.title}</h1>`;
    if(s.sub) html += `<p class="sub">${s.sub}</p>`;
    html += progressionTable(s.rows||[]);
  } else {
    if(s.eyebrow) html+=`<span class="eyebrow">${s.eyebrow}</span>`;
    html += `<h1 class="title">${s.title}</h1>`;
    const isScreenA = (s.eyebrowR||'').includes('Screen A');
    const colClass = isScreenA ? 'cols screen-a wide-left' : `cols ${s.wideLeft?'wide-left':''}`;
    const leftCls = isScreenA ? 'col left-a' : 'col';
    const rightCls = isScreenA ? 'col right-a' : 'col';
    const left = (s.left||[]).map(renderBlock).join('');
    const right = (s.right||[]).map(renderBlock).join('');
    html += `<div class="${colClass}"><div class="${leftCls}">${left}</div><div class="${rightCls}">${right}</div></div>`;
  }
  if(s.screenlbl) html+=`<div class="screenlbl">${s.screenlbl}</div>`;
  html += `<div class="corner"><kbd>T</kbd> notes · <kbd>D</kbd> detach · <kbd>A</kbd> assessment · <kbd>I</kbd> InfoReport</div>`;
  el.innerHTML = html;
}
let idx = 0;
function syncInfoReportBtn(){}
function show(i){
  idx = Math.max(0, Math.min(SLIDES.length-1, i));
  renderSlide(SLIDES[idx]);
  document.getElementById('counter').textContent = `${idx+1} / ${SLIDES.length}`;
  document.getElementById('jump').value = idx;
  if(document.getElementById('tnotes').classList.contains('open')) fillNotes();
  syncInfoReportBtn();
  updatePresentScale();
}
function buildJump(){
  const sel=document.getElementById('jump'); sel.innerHTML='';
  SLIDES.forEach((s,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=`${i+1}. ${s.nav||s.title||('Slide '+(i+1))}`; sel.appendChild(o); });
}
function fillNotes(){
  const s=SLIDES[idx];
  document.getElementById('tnotesTitle').textContent=s.nav||s.title||`Slide ${idx+1}`;
  document.getElementById('tnotesBody').innerHTML=(typeof TEACHER_NOTES!=='undefined'&&TEACHER_NOTES[s.nav])||s.notes||'<p>No notes for this screen.</p>';
}
function openNotes(){ document.getElementById('tnotes').classList.add('open'); document.getElementById('notesBtn').classList.add('notes-open'); fillNotes(); }
function closeNotes(){ document.getElementById('tnotes').classList.remove('open'); document.getElementById('notesBtn').classList.remove('notes-open'); }
function detachNotes(){
  const s=SLIDES[idx];
  const w=window.open('','tnotes','width=460,height=760');
  w.document.write(`<title>Teacher Notes — ${s.nav||s.title}</title><style>body{font-family:system-ui;background:#0f1c24;color:#b4c2c6;line-height:1.6;padding:22px;}h2{color:#ffe082}h4{color:#7ec4b4;margin:14px 0 4px}ul{margin-left:18px}li{margin:4px 0}</style><h2>${s.nav||s.title}</h2>${(typeof TEACHER_NOTES!=='undefined'&&TEACHER_NOTES[s.nav])||s.notes||'<p>No notes.</p>'}`);
  w.document.close();
}
let savedIdxForOverlay=null;
function switchAssessTab(pane){
  document.querySelectorAll('#overlay .tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('#overlay .panelpane').forEach(x=>x.classList.remove('active'));
  document.querySelector(`#overlay .tab[data-pane="${pane}"]`)?.classList.add('active');
  document.getElementById('pane-'+pane)?.classList.add('active');
}
function openOverlay(forcedPane){
  savedIdxForOverlay=idx;
  const slide = SLIDES[idx];
  const pane = (typeof forcedPane === 'string' && forcedPane) || slide?.assessTab || ASSESS_TAB_BY_NAV[slide?.nav] || 'task';
  switchAssessTab(pane);
  document.getElementById('overlay').classList.add('open');
}
function closeOverlay(){ document.getElementById('overlay').classList.remove('open'); if(savedIdxForOverlay!=null) show(savedIdxForOverlay); }
function openInfoReport(){ window.open(INFOREPORT_URL, '_blank', 'noopener'); }
document.getElementById('prev').onclick=()=>show(idx-1);
document.getElementById('next').onclick=()=>show(idx+1);
document.getElementById('jump').onchange=e=>show(+e.target.value);
document.getElementById('notesBtn').onclick=openNotes;
document.getElementById('notesClose').onclick=closeNotes;
document.getElementById('detachBtn').onclick=detachNotes;
document.getElementById('assessBtn').onclick=()=>openOverlay();
document.getElementById('inforeportBtn').onclick=openInfoReport;
document.getElementById('backBtn').onclick=closeOverlay;
function isPresenting(){
  return document.documentElement.classList.contains('presenting')
    || document.fullscreenElement || document.webkitFullscreenElement;
}
function setPresenting(on){ document.documentElement.classList.toggle('presenting', on); syncPresentBtn(); updatePresentScale(); }
function updatePresentScale(){
  const slide=document.getElementById('slide');
  if(!isPresenting()){ slide.style.transform=''; return; }
  const wrap=document.getElementById('stageWrap');
  const scale=Math.min(wrap.clientWidth/1180, wrap.clientHeight/738);
  slide.style.transform=`scale(${scale})`;
}
function togglePresent(){
  if(isPresenting()){
    setPresenting(false);
    if(document.fullscreenElement||document.webkitFullscreenElement)
      (document.exitFullscreen||document.webkitExitFullscreen||document.msExitFullscreen)?.call(document);
  } else {
    setPresenting(true);
    const el=document.documentElement;
    const req=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen;
    if(req) req.call(el).catch(()=>{});
  }
}
function syncPresentBtn(){
  document.getElementById('presentBtn').textContent = isPresenting() ? '⤢ Exit' : '⛶ Present';
}
function onFullscreenChange(){
  if(!document.fullscreenElement&&!document.webkitFullscreenElement)
    document.documentElement.classList.remove('presenting');
  syncPresentBtn();
  updatePresentScale();
}
document.getElementById('presentBtn').onclick=togglePresent;
document.addEventListener('fullscreenchange',onFullscreenChange);
document.addEventListener('webkitfullscreenchange',onFullscreenChange);
window.addEventListener('resize',updatePresentScale);
document.querySelectorAll('#overlay .tab').forEach(t=>t.onclick=()=>switchAssessTab(t.dataset.pane));
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='SELECT') return;
  if(e.key==='ArrowRight') show(idx+1);
  else if(e.key==='ArrowLeft') show(idx-1);
  else if(e.key.toLowerCase()==='t'){ document.getElementById('tnotes').classList.contains('open')?closeNotes():openNotes(); }
  else if(e.key.toLowerCase()==='d') detachNotes();
  else if(e.key.toLowerCase()==='a'){ document.getElementById('overlay').classList.contains('open')?closeOverlay():openOverlay(); }
  else if(e.key.toLowerCase()==='i') openInfoReport();
  else if(e.key.toLowerCase()==='f') togglePresent();
  else if(e.key==='Escape'){
    if(document.getElementById('tnotes').classList.contains('open')){ closeNotes(); return; }
    if(isPresenting()){ togglePresent(); return; }
    closeOverlay();
  }
});
document.getElementById('pane-task').innerHTML = ASSESS_TASK;
document.getElementById('pane-reading').innerHTML = ASSESS_READING;
document.getElementById('pane-guide').innerHTML = ASSESS_GUIDE;
buildJump(); show(0);
</script>
