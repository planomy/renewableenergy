<script>
const TEACHER_NOTES = {
  'Cover': `<p>Welcome students to the 8-week Year 5 English unit on <b>Renewable Energy</b>. The culminating task is an information report due <b>28 August 2026</b>.</p>
<h4>Unit arc</h4><p>Weeks 1–6 build content knowledge (five energy types). Weeks 7–8 focus on report structure, TEEL paragraphs, and publishing via InfoReport.</p>
<h4>Report writer</h4><p>Draft at <b>planomy.github.io/inforeport</b> — click <b>✎ InfoReport</b> in the nav bar or press <b>I</b> on any slide. Final publish in Word (12pt Arial) to OneNote.</p>
<h4>Assessments</h4><ul><li><b>Written report</b> — information report on renewable energy (200–400 words)</li><li><b>Reading assessment</b> — ENG05 SA4 2026; press <b>A</b> and open the Reading tab</li></ul>
<h4>Navigation</h4><ul><li><b>← →</b> Prev/Next · <b>Jump</b> menu · <b>T</b> teacher notes · <b>A</b> assessment · <b>I</b> InfoReport · <b>F</b> present mode</li></ul>`,
  'Unit overview': `<h4>Using this slide</h4><p>Share at the start of term so students see the full arc — content weeks 1–6, writing weeks 7–8, assessment at the end of Week 8.</p>
<h4>Lesson rhythm</h4><ul><li><b>Screen A (Learn):</b> Hook, Word Work, discussion starters, spelling focus, report thread preview</li><li><b>Screen B (Apply):</b> Sentence work, reading passage, workbook tasks, report work, exit check</li></ul>
<h4>Report thread</h4><p>Glossary begins Week 1 Lesson 1. Topic sentences from Week 2. Body paragraphs from Week 2 Lesson 6. Full draft in Week 7; publish in Week 8.</p>
<h4>Pacing</h4><p>24 lessons across 8 weeks — aim for two lesson pairs per week. Each pair = one energy type or one writing focus.</p>
<h4>Assessment reminders</h4><p>Report due <b>28 August 2026</b>. Reading assessment (ENG05 SA4) available via <b>A</b> overlay. Encourage students to keep a single Glossary Doc all term.</p>`,
  'Week 1': `<h4>Preview goals</h4><ul><li>Define <b>energy</b> and explain where it comes from</li><li>Distinguish <b>renewable</b> from <b>non-renewable</b> sources</li><li>Explain why communities switch to renewables</li></ul>
<h4>Connect to report thread</h4><p>This week seeds the glossary (energy, resource, fuel, renewable, fossil fuel, sustainable, emissions, climate) and the <b>general statement</b> for the report introduction. By Lesson 3 students should have a draft opening sentence.</p>
<h4>Pacing</h4><p>Three lesson pairs — foundation before energy-type deep dives in Weeks 2–6.</p>
<h4>Watch for</h4><p>Students confusing everyday "energy" (tiredness) with scientific energy. Reinforce: energy = ability to do work.</p>`,
  'L1A — What is Energy?': `<h4>Hook (5 min)</h4><p>Display the hero image. Ask: "Think of three things you did today that needed energy. Where did that energy come from?" Pair-share, then whole-class — trace energy back to food, electricity, fuel.</p>
<h4>Word Work (5 min)</h4><ul><li><b>energy</b> — the ability to do work or make things happen</li><li><b>resource</b> — a supply of something useful that can be drawn on</li><li><b>fuel</b> — a material that releases energy when it is burned</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> If you could see energy moving through your classroom right now, what would it look like — and where would you see the most?<br><i>Tip:</i> Point to lights, devices, bodies — energy transfers but is not "used up" in the everyday sense.</li><li><b>Q2:</b> Is food energy the same kind of energy as electricity? What is similar and what is different?<br><i>Tip:</i> Both let things happen; food is chemical energy stored in molecules; electricity is a current of charged particles.</li><li><b>Q3:</b> When someone says "I have no energy today," are they using the scientific meaning — or something else?<br><i>Tip:</i> Introduce precise vs everyday language — important for information reports later.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Word ending: -ergy</b> — energy, synergy, allergy.</p><p>Copy each word. Underline the -ergy chunk. Discuss how the ending carries across words.</p>
<h4>Report thread</h4><p>Students will <b>start their Glossary Doc</b> on Screen B. Preview that every lesson adds technical vocabulary they will use in the final report.</p>`,
  'L1B — Content': `<h4>Sentence work (10 min)</h4><p><b>Analyse</b></p><p>Model: "The sun, wind and water are all powerful sources of renewable energy."</p><p>Circle noun groups. Underline adjectives. Find the connecting word (and).</p><p><i>Starters:</i> "Energy is…" | "We use energy to…" | "One source of energy is…"</p>
<h4>Reading (10 min)</h4><p>Passage defines energy in everyday life and introduces fossil fuels as non-renewable. Students note two daily uses of energy and define energy in their own words.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — What is energy? List two ways we use energy every day in your workbook.</li><li><b>Glossary</b> — Start Glossary Doc — add energy, resource and fuel with student definitions.</li></ul><p><b>Challenge:</b> Research one unusual energy source not covered in this unit.</p>
<h4>Report work</h4><p>Glossary is the first report artefact. Check definitions use formal language, not only casual examples.</p>
<h4>Exit check</h4><ul><li>use vocabulary accurately</li><li>complete workbook tasks</li><li>add to my glossary or report</li></ul><h4>Watch for</h4><p>Students who list only electricity — push for food, movement, heat.</p>`,
  'L2A — Renewable vs Non-Renewable': `<h4>Hook (5 min)</h4><p>Ask: "What do renewable and non-renewable make you think of? Give an example of each." Quick sort on board: sun vs coal.</p>
<h4>Word Work (5 min)</h4><ul><li><b>renewable</b> — can be naturally replaced and will not run out</li><li><b>non-renewable</b> — cannot be replaced quickly; will eventually run out</li><li><b>fossil fuel</b> — coal, oil or natural gas formed from ancient living things</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> If coal and oil disappeared tomorrow, which activities in your life would change first?<br><i>Tip:</i> Makes abstract scarcity personal — transport, heating, plastics.</li><li><b>Q2:</b> Can something be renewable in one place but non-renewable in another? Give an example.<br><i>Tip:</i> Timber can be renewable with replanting but non-renewable if forests are cleared faster than they regrow.</li><li><b>Q3:</b> We already have renewable options — so why do you think fossil fuels are still used so widely?<br><i>Tip:</i> Cost, infrastructure, reliability — foreshadows pros/cons weeks.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Prefix: re-</b> — renewable, reuse, recycle, replace.</p><p>What does re- mean? Students write their own re- word and define it.</p>
<h4>Report thread</h4><p>Glossary grows with renewable, non-renewable, fossil fuel. These terms appear in the introduction and body of the report.</p>`,
  'L2B — Content': `<h4>Sentence work (10 min)</h4><p><b>Combine</b></p><p>Model: "Fossil fuels are useful. They are running out."</p><p>Join into one complex sentence using although, but or however.</p><p><i>Starters:</i> "Although fossil fuels are useful…" | "Fossil fuels are useful; however…"</p>
<h4>Reading (10 min)</h4><p>Reading contrasts renewable and non-renewable groups. Students draw a T-chart with at least three examples per column.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — T-chart: Renewable | Non-Renewable — 3+ examples each.</li><li><b>Glossary</b> — Add renewable, non-renewable and fossil fuel.</li></ul><p><b>Challenge:</b> Create a visual showing how fossil fuels form over millions of years.</p>
<h4>Report work</h4><p>T-chart becomes source material for comparing energy types in Week 6 and for report body sections.</p>
<h4>Exit check</h4><ul><li>use vocabulary accurately</li><li>complete workbook tasks</li><li>add to my glossary or report</li></ul><h4>Watch for</h4><p>Students who put "solar" as non-renewable — clarify sun vs panels manufacturing.</p>`,
  'L3A — Why Switch to Renewables?': `<h4>Hook (5 min)</h4><p>Climate image on screen. Ask: "What problems might happen if we keep burning fossil fuels?" Collect ideas — storms, heat, pollution — without judging yet.</p>
<h4>Word Work (5 min)</h4><ul><li><b>sustainable</b> — able to continue long-term without harming the environment</li><li><b>emissions</b> — gases released into the air, especially by burning fuel</li><li><b>climate</b> — the long-term weather patterns of a region or the whole Earth</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> Who benefits most from switching to renewables — people alive today, or people born in 50 years?<br><i>Tip:</i> Intergenerational fairness — links to report purpose and formal tone.</li><li><b>Q2:</b> Can a wealthy country still choose to burn fossil fuels? What reasons might leaders give?<br><i>Tip:</i> Economic and political dimensions; avoid simplistic blame.</li><li><b>Q3:</b> If you could fix one climate-related problem in your community, what would it be and how could clean energy help?<br><i>Tip:</i> Localise abstract climate vocabulary.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Suffix: -able</b> — sustainable, renewable, reliable.</p><p>What does -able mean? Add one more -able word from the unit or elsewhere.</p>
<h4>Report thread</h4><p>Students will draft their <b>general statement</b> on Screen B — the opening sentence of the report introduction.</p>`,
  'L3B — Content': `<h4>Sentence work (10 min)</h4><p><b>Starters</b></p><p>Model: "(Open sentence practice — no fixed model)"</p><p>Students write sentences using formal starters about climate and renewable energy.</p><p><i>Starters:</i> "Climate change occurs when…" | "One reason we need renewable energy is…"</p>
<h4>Reading (10 min)</h4><p>Passage links fossil-fuel emissions to climate change and argues for renewables. Students write two evidence-based reasons renewables matter.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — Two reasons renewable energy is important — use evidence from reading.</li><li><b>General statement</b> — Write one general statement about renewable energy for report introduction. Share with teacher.</li></ul><p><b>Challenge:</b> Find a recent news article about climate change. Summarise in 3 sentences.</p>
<h4>Report work</h4><p>Conference on general statements — must define/classify topic, not begin with "In this report I will…" alone. Model: "Renewable energy is energy drawn from sources that are naturally replenished."</p>
<h4>Exit check</h4><ul><li>use vocabulary accurately</li><li>complete workbook tasks</li><li>add to my glossary or report</li></ul><h4>Watch for</h4><p>Opinion without evidence — push for facts from the reading passage.</p>`,
  'Week 2': `<h4>Preview goals</h4><ul><li>Understand solar energy and the photovoltaic effect</li><li>Explain how solar panels generate electricity</li><li>Evaluate advantages and disadvantages of solar power</li></ul>
<h4>Connect to report thread</h4><p>First full <b>energy-type body paragraph</b> drafted this week (Lesson 6). Glossary adds solar, photovoltaic, electricity, convert, silicon, efficient, disadvantage, generate.</p>
<h4>Pacing</h4><p>Lesson 4 = what; Lesson 5 = how; Lesson 6 = evaluate. Pattern repeats for wind, hydro, geothermal, tidal.</p>
<h4>Watch for</h4><p>Students conflating heat from sunlight with electricity generation — distinguish solar thermal from photovoltaic before Lesson 5.</p>`,
  'L4A — What is Solar Energy?': `<h4>Hook (5 min)</h4><p>Sunny-day hook: "On a sunny day, have you noticed how warm a dark surface gets? Where does that heat come from?" Link to sun as ultimate source.</p>
<h4>Word Work (5 min)</h4><ul><li><b>solar</b> — relating to or produced by the sun</li><li><b>photovoltaic</b> — converting light energy directly into electricity</li><li><b>panel</b> — a flat surface device that collects sunlight</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> Australia gets more sunlight than many countries — so why is every roof not already covered in solar panels?<br><i>Tip:</i> Cost, storage, grid, rental homes — not just "people don't care."</li><li><b>Q2:</b> The sun has been shining for billions of years, yet we only recently harnessed it for electricity. What took so long?<br><i>Tip:</i> Technology, silicon cells, efficiency — preview Lesson 5.</li><li><b>Q3:</b> Could living things survive without the sun's energy? What would stop working first?<br><i>Tip:</i> Photosynthesis, food chains — solar underpins life, not only electricity.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Prefix: photo-</b> — photovoltaic, photograph, photosynthesis.</p><p>Photo- means light (Greek). How does light link each word?</p>
<h4>Report thread</h4><p>Add solar and photovoltaic to glossary. Solar will be the first named energy type in the report body.</p>`,
  'L4B — Content': `<h4>Sentence work (10 min)</h4><p><b>Analyse</b></p><p>Model: "Photovoltaic panels convert sunlight directly into electrical energy using tiny silicon cells."</p><p>Find the verb group. Circle technical vocabulary. Identify the noun group.</p><p><i>Starters:</i> "Solar energy is…" | "The sun produces energy by…" | "Solar panels work by…"</p>
<h4>Reading (10 min)</h4><p>Explains solar thermal vs photovoltaic energy and Australia's solar potential. Two facts recorded in workbook.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — What is solar energy? Where does it come from? Give 2 facts.</li><li><b>Glossary</b> — Add solar and photovoltaic with student definitions.</li></ul><p><b>Challenge:</b> Find which country gets the most solar energy and explain why.</p>
<h4>Report work</h4><p>Facts from reading feed the solar body section. Check students distinguish heat capture from electricity generation.</p>
<h4>Exit check</h4><ul><li>use vocabulary accurately</li><li>complete workbook tasks</li><li>add to my glossary or report</li></ul><h4>Watch for</h4><p>Mispronouncing photovoltaic — break into syllables: pho-to-vol-taic.</p>`,
  'L5A — How Solar Panels Work': `<h4>Hook (5 min)</h4><p>Diagram on screen. "If you were designing a solar-powered house, where would you put the panels? Why?" Discuss roof angle, shade, north-facing (Southern Hemisphere).</p>
<h4>Word Work (5 min)</h4><ul><li><b>electricity</b> — energy that flows as a current through wires and devices</li><li><b>convert</b> — to change something from one form to another</li><li><b>silicon</b> — a material used in solar cells that reacts to sunlight</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> Solar panels turn light into electricity without a sound. What other everyday change feels almost magical when you think about it?<br><i>Tip:</i> Build wonder while staying scientific — good report tone.</li><li><b>Q2:</b> On a cloudy day, would a solar panel still work? What evidence would you look for?<br><i>Tip:</i> Reduced output, not zero — nuance for pros/cons lesson.</li><li><b>Q3:</b> Why is silicon — basically refined sand — so important to modern solar technology?<br><i>Tip:</i> Semiconductor properties; links to convert and electricity.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Suffix: -ity</b> — electricity, capacity, activity.</p><p>Remove -ity from each word. What root word is left?</p>
<h4>Report thread</h4><p>Students will write a <b>solar topic sentence</b> on Screen B — first body-paragraph opener.</p>`,
  'L5B — Content': `<h4>Sentence work (10 min)</h4><p><b>Combine</b></p><p>Model: "Solar panels collect sunlight. They turn it into electricity."</p><p>Join using which, and convert or to.</p><p><i>Starters:</i> "A solar panel works by…" | "When sunlight hits the panel…"</p>
<h4>Reading (10 min)</h4><p>Photovoltaic effect, silicon cells, DC/AC, inverter explained. Students label a diagram.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — Draw and label how a solar panel generates electricity.</li><li><b>Topic sentence</b> — Write a topic sentence about solar energy for the report body.</li></ul><p><b>Challenge:</b> Research the photovoltaic effect and explain in your own words.</p>
<h4>Report work</h4><p>Topic sentence must name the subtopic (how solar works) not only "Solar is good." Conference 1:1.</p>
<h4>Exit check</h4><ul><li>use vocabulary accurately</li><li>complete workbook tasks</li><li>add to my glossary or report</li></ul><h4>Watch for</h4><p>Confusing inverter with battery — clarify grid vs storage.</p>`,
  'L6A — Solar Energy Pros and Cons': `<h4>Hook (5 min)</h4><p>"Would solar panels work well where you live? Advantages and challenges?" Local geography shapes answers.</p>
<h4>Word Work (5 min)</h4><ul><li><b>efficient</b> — producing results with little waste of time or energy</li><li><b>disadvantage</b> — a feature that makes something less useful or effective</li><li><b>generate</b> — to produce or create something, especially energy</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> Sunshine is free — but is solar power truly free once you count making, installing and recycling the panels?<br><i>Tip:</i> Full life-cycle cost — strong report evidence.</li><li><b>Q2:</b> Some deserts have endless sun but few people. Who should get to use that solar power?<br><i>Tip:</i> Equity and transmission — links to Week 6 comparison.</li><li><b>Q3:</b> Would you rather live next to a solar farm or a coal power station? What would influence your choice?<br><i>Tip:</i> Environmental and social factors; balanced evaluation.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Prefix: dis-</b> — disadvantage, disconnect, disagree.</p><p>dis- means "not" or "opposite." Write two more dis- words.</p>
<h4>Report thread</h4><p>Advantages/disadvantages table begins — template for wind, hydro, geothermal, tidal.</p>`,
  'L6B — Content': `<h4>Sentence work (10 min)</h4><p><b>Starters</b></p><p>Model: "(Evaluation sentences)"</p><p>Write balanced sentences using advantage/disadvantage starters.</p><p><i>Starters:</i> "One advantage of solar energy is…" | "A disadvantage is that…"</p>
<h4>Reading (10 min)</h4><p>Balanced passage on solar pros and cons including intermittency and cost. Complete 2-column table.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — Advantages | Disadvantages table — 2 of each for solar.</li><li><b>Body paragraph</b> — Draft solar body paragraph: topic sentence + 2 details + closing sentence.</li></ul><p><b>Challenge:</b> Persuasive argument — should your school install solar panels?</p>
<h4>Report work</h4><p>First full TEEL-style paragraph. Check topic sentence, evidence, explanation, link — even if not labelled yet.</p>
<h4>Exit check</h4><ul><li>use vocabulary accurately</li><li>complete workbook tasks</li><li>add to my glossary or report</li></ul><h4>Watch for</h4><p>One-sided lists — require at least one genuine disadvantage.</p>`,
  'Week 3': `<h4>Preview goals</h4><ul><li>Understand wind as kinetic energy</li><li>Explain how wind turbines work</li><li>Evaluate advantages and disadvantages of wind power</li></ul>
<h4>Connect to report thread</h4><p>Wind glossary terms, topic sentence (L8), full wind body paragraph (L9).</p>
<h4>Pacing</h4><p>Two screens per lesson — complete A before B. Allow time for glossary and report work every lesson.</p>
<h4>Watch for</h4><p>Confusing windmills (historical) with modern turbines — clarify generator and electricity output.</p>`,
  'Week 4': `<h4>Preview goals</h4><ul><li>Understand hydropower and dams</li><li>Explain how hydroelectric dams generate electricity</li><li>Evaluate advantages and disadvantages of hydropower</li></ul>
<h4>Connect to report thread</h4><p>Hydro glossary, topic sentence (L11), hydropower body paragraph (L12).</p>
<h4>Pacing</h4><p>Two screens per lesson — complete A before B. Allow time for glossary and report work every lesson.</p>
<h4>Watch for</h4><p>Students who treat all moving water as equal — emphasise reservoir height and potential energy (Lesson 11).</p>`,
  'Week 5': `<h4>Preview goals</h4><ul><li>Understand geothermal energy from Earth heat</li><li>Explain how geothermal plants work</li><li>Evaluate advantages and disadvantages of geothermal power</li></ul>
<h4>Connect to report thread</h4><p>Geothermal glossary, topic sentence (L14), geothermal body paragraph (L15).</p>
<h4>Pacing</h4><p>Two screens per lesson — complete A before B. Allow time for glossary and report work every lesson.</p>
<h4>Watch for</h4><p>Assuming geothermal works everywhere — location near volcanic or tectonic zones is essential (Iceland, NZ examples).</p>`,
  'Week 6': `<h4>Preview goals</h4><ul><li>Understand tidal energy and predictability</li><li>Explain how tidal energy is captured</li><li>Compare all five renewable energy types</li></ul>
<h4>Connect to report thread</h4><p>Tidal glossary, topic sentence (L17), comparison table and review of all five topic sentences (L18).</p>
<h4>Pacing</h4><p>Two screens per lesson — complete A before B. Allow time for glossary and report work every lesson.</p>
<h4>Watch for</h4><p>Lesson 18 comparison table is critical before writing weeks — ensure all five topic sentences are complete and distinct.</p>`,
  'Week 7': `<h4>Preview goals</h4><ul><li>Understand information report structure</li><li>Write a strong introduction</li><li>Draft body paragraphs with topic sentences and evidence</li></ul>
<h4>Connect to report thread</h4><p>Report plan (L19), draft introduction (L20), TEEL body paragraph (L21). Open assessment overlay from L19.</p>
<h4>Pacing</h4><p>Two screens per lesson — complete A before B. Allow time for glossary and report work every lesson.</p>
<h4>Assessment</h4><p>Press <b>A</b> to show report rubric and reading assessment (ENG05 SA4). Report due <b>28 August 2026</b>.</p>`,
  'Week 8': `<h4>Preview goals</h4><ul><li>Use the InfoReport tool to draft sections</li><li>Complete all five body sections</li><li>Review, proofread and publish the report</li></ul>
<h4>Connect to report thread</h4><p>Type introduction (L22), five body sections (L23), publish with conclusion (L24). Due 28 August 2026.</p>
<h4>Pacing</h4><p>Supervised drafting sessions — authentication requires observed work and a submitted plan.</p>
<h4>InfoReport</h4><p>Open <b>planomy.github.io/inforeport</b> (or press <b>I</b>). Final publish: Word 12pt Arial to OneNote.</p>`,
  'L7A — What is Wind Energy?': `<h4>Hook (5 min)</h4><p>"Have you ever seen a wind turbine? What did it look like? Where was it?"</p>
<h4>Word Work (5 min)</h4><ul><li><b>turbine</b> — a machine with spinning blades used to generate electricity</li><li><b>wind farm</b> — a group of wind turbines built in one location</li><li><b>kinetic energy</b> — the energy an object has because of its movement</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> Wind is invisible until it moves something. What everyday signs tell you wind has energy?<br><i>Tip:</i> Flags, rustling leaves, feeling on skin.</li><li><b>Q2:</b> Why are wind farms in open fields or offshore rather than cities?<br><i>Tip:</i> Space, wind speed, noise, zoning.</li><li><b>Q3:</b> If wind stopped for a week in a wind-powered town, what would change?<br><i>Tip:</i> Backup power, batteries, grid mix.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Suffix: -ation</b> — rotation, generation, location.</p><p>Remove -ation. What verb root remains?</p>
<h4>Report thread</h4><p>Glossary: turbine, kinetic energy, wind farm.</p>`,
  'L7B — Content': `<h4>Sentence work (10 min)</h4><p><b>Analyse</b></p><p>Model: "Wind turbines harness the kinetic energy of moving air to generate clean electricity."</p><p>Identify verb group. Circle technical terms. Purpose of "to generate…"?</p><p><i>Starters:</i> "Wind energy is produced when…" | "Wind turbines are used to…"</p>
<h4>Reading (10 min)</h4><p>Wind formation from uneven heating; kinetic energy; modern turbines.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — What is wind energy? How is wind formed?</li><li><b>Glossary</b> — Add turbine, kinetic energy, wind farm.</li></ul><p><b>Challenge:</b> Research world's largest wind farm — 3 facts.</p>
<h4>Report work</h4><p>Wind facts for report body section.</p>
<h4>Exit check</h4><ul><li>use vocabulary accurately</li><li>complete workbook tasks</li><li>add to my glossary or report</li></ul>`,
  'L8A — How Wind Turbines Work': `<h4>Hook (5 min)</h4><p>"Why might offshore turbines produce more electricity than onshore ones?"</p>
<h4>Word Work (5 min)</h4><ul><li><b>generator</b> — a machine that converts movement into electricity</li><li><b>offshore</b> — located in or on the sea, away from the coast</li><li><b>rotation</b> — movement in a circle around a central point</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> A turbine blade longer than a bus — how does size affect output?<br><i>Tip:</i> More swept area, more energy captured.</li><li><b>Q2:</b> Offshore costs more but produces more — when is it worth it?<br><i>Tip:</i> Strong consistent winds, near coastal cities.</li><li><b>Q3:</b> What sounds or sights near turbines bother some people?<br><i>Tip:</i> Noise, shadow flicker, visual impact — foreshadow L9.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Suffix: -or</b> — generator, conductor, inventor.</p><p>-or = person/thing that does. Add one -or word.</p>
<h4>Report thread</h4><p>Wind topic sentence drafted on L8B.</p>`,
  'L8B — Content': `<h4>Sentence work (10 min)</h4><p><b>Combine</b></p><p>Model: "Wind farms have many turbines. They are built in open, windy areas."</p><p>Use which to join into a relative clause sentence.</p><p><i>Starters:</i> "A wind turbine generates electricity by…" | "The spinning blades…"</p>
<h4>Reading (10 min)</h4><p>Turbine mechanics: blades, shaft, generator; onshore vs offshore.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — 2–3 sentences on how a turbine generates electricity — use generator.</li><li><b>Topic sentence</b> — Write wind energy topic sentence for report.</li></ul><p><b>Challenge:</b> Why offshore farms are more efficient.</p>
<h4>Report work</h4><p>Topic sentence names how wind produces electricity.</p>
<h4>Exit check</h4><ul><li>use vocabulary accurately</li><li>complete workbook tasks</li><li>add to my glossary or report</li></ul>`,
  'L9A — Wind Energy Pros and Cons': `<h4>Hook (5 min)</h4><p>"You are a farmer — would you want a turbine on your land? Good and bad?"</p>
<h4>Word Work (5 min)</h4><ul><li><b>intermittent</b> — not continuous; stopping and starting at irregular intervals</li><li><b>consistent</b> — happening at the same rate or level without much variation</li><li><b>transmission</b> — the process of sending electricity through power lines</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> Wind is free but farms cost millions — where does the money go?<br><i>Tip:</i> Manufacturing, installation, maintenance, grid connection.</li><li><b>Q2:</b> Bird collisions — balance wildlife and clean power?<br><i>Tip:</i> Siting, technology, monitoring.</li><li><b>Q3:</b> Communities welcome or oppose wind farms — what would you do?<br><i>Tip:</i> Jobs, rent, noise, landscape.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Suffix: -ent</b> — intermittent, consistent, efficient.</p><p>What do these words share? Add one -ent word.</p>
<h4>Report thread</h4><p>Complete wind advantages/disadvantages table.</p>`,
  'L9B — Content': `<h4>Sentence work (10 min)</h4><p><b>Starters</b></p><p>Model: "(Evaluation)"</p><p>Balanced advantage/disadvantage sentences for wind.</p><p><i>Starters:</i> "One advantage of wind energy is…" | "However, wind energy can be…"</p>
<h4>Reading (10 min)</h4><p>Clean, cheap, intermittent; community concerns.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — Advantages/disadvantages table — 2 each for wind.</li><li><b>Body paragraph</b> — Draft wind body paragraph with topic sentence + 2 details + close.</li></ul><p><b>Challenge:</b> Letter to council recommending wind energy.</p>
<h4>Report work</h4><p>Second full energy-type paragraph — compare quality to solar (L6).</p>
<h4>Exit check</h4><ul><li>use vocabulary accurately</li><li>complete workbook tasks</li><li>add to my glossary or report</li></ul>`,
  'L10A — What is Hydropower?': `<h4>Hook (5 min)</h4><p>"Stood near a waterfall or fast river — where does that power come from?"</p>
<h4>Word Work (5 min)</h4><ul><li><b>hydropower</b> — electricity generated from the energy of moving water</li><li><b>dam</b> — a barrier built across a river to hold back water</li><li><b>reservoir</b> — a large artificial lake used to store water</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> Calm river surface, hidden power — what clues suggest harvestable energy?<br><i>Tip:</i> Speed, drop, volume, season.</li><li><b>Q2:</b> Indigenous respect for rivers — how might that shape dam decisions?<br><i>Tip:</i> Cultural connection, consultation, environmental impact.</li><li><b>Q3:</b> Could a small farm stream power a home?<br><i>Tip:</i> Micro-hydro vs large-scale — scale matters.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Prefix: hydro-</b> — hydropower, hydroelectric, hydrogen.</p><p>hydro- = water. Link each word to water.</p>
<h4>Report thread</h4><p>Glossary: hydropower, dam, reservoir.</p>`,
  'L10B — Content': `<h4>Sentence work (10 min)</h4><p><b>Analyse</b></p><p>Model: "Hydropower stations use the gravitational potential energy of water stored in large reservoirs."</p><p>Noun groups, adjectives, technical vocabulary.</p><p><i>Starters:</i> "Hydropower works by…" | "Water stored in a reservoir…"</p>
<h4>Reading (10 min)</h4><p>Dams, reservoirs, ~16% world electricity; established renewable.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — What is hydropower? How produced? 2 facts.</li><li><b>Glossary</b> — Add hydropower, dam, reservoir.</li></ul><p><b>Challenge:</b> Country generating most hydropower — why?</p>
<h4>Report work</h4><p>Hydro section facts — include scale statistic if possible.</p>
<h4>Exit check</h4><ul><li>use vocabulary accurately</li><li>complete workbook tasks</li><li>add to my glossary or report</li></ul>`,
  'L11A — How Hydro Dams Work': `<h4>Hook (5 min)</h4><p>"Why does water high behind a dam have more energy than at the bottom?"</p>
<h4>Word Work (5 min)</h4><ul><li><b>potential energy</b> — stored energy an object has because of its position</li><li><b>penstock</b> — a large pipe that carries water from a reservoir to the turbines</li><li><b>gravitational</b> — relating to the force of gravity that pulls objects downward</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> Dams store water like batteries — what are you really storing?<br><i>Tip:</i> Gravitational potential energy / height.</li><li><b>Q2:</b> When gates open, where did the energy come from originally?<br><i>Tip:</i> Sun evaporates water, rain on mountains — energy chain.</li><li><b>Q3:</b> Flooding land forever — what would you want to know first?<br><i>Tip:</i> Displacement, ecosystems, cultural sites.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Suffix: -al</b> — gravitational, electrical, potential.</p><p>-al turns nouns into adjectives. Find the noun inside each.</p>
<h4>Report thread</h4><p>Hydro topic sentence on L11B.</p>`,
  'L11B — Content': `<h4>Sentence work (10 min)</h4><p><b>Combine</b></p><p>Model: "Water flows down through the dam. It spins a turbine."</p><p>Join using as to show simultaneous action.</p><p><i>Starters:</i> "A hydroelectric dam generates electricity by…" | "Water flowing through the dam…"</p>
<h4>Reading (10 min)</h4><p>Potential energy, penstocks, turbines, transmission lines.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — Topic sentence on how hydro dams work — include potential energy.</li><li><b>Body paragraph</b> — Start hydropower body paragraph with topic sentence.</li></ul><p><b>Challenge:</b> Labelled cross-section diagram of a dam.</p>
<h4>Report work</h4><p>Ensure potential energy and penstock used accurately.</p>
<h4>Exit check</h4><ul><li>use vocabulary accurately</li><li>complete workbook tasks</li><li>add to my glossary or report</li></ul>`,
  'L12A — Hydropower Pros and Cons': `<h4>Hook (5 min)</h4><p>"A dam near your town — who is affected? Good and bad sides?"</p>
<h4>Word Work (5 min)</h4><ul><li><b>habitat</b> — the natural environment where an organism lives and grows</li><li><b>displacement</b> — being forced to move away from your home or environment</li><li><b>ecosystem</b> — all the living things in an area and how they interact</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> Hydropower runs day and night — why is reliability a big advantage?<br><i>Tip:</i> Baseload power vs solar/wind intermittency.</li><li><b>Q2:</b> Largest dams displaced millions — who decides?<br><i>Tip:</i> Government, communities, Indigenous rights.</li><li><b>Q3:</b> Droughts shrink reservoirs — is hydro still renewable?<br><i>Tip:</i> Climate risk to water-dependent generation.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Suffix: -ment</b> — displacement, environment, movement.</p><p>-ment turns verbs into nouns. Find the verb inside each.</p>
<h4>Report thread</h4><p>Hydropower pros/cons table and body paragraph completion.</p>`,
  'L12B — Content': `<h4>Sentence work (10 min)</h4><p><b>Starters</b></p><p>Model: "(Evaluation)"</p><p>Sentences on hydro disadvantages and ecosystem impact.</p><p><i>Starters:</i> "One disadvantage of hydropower is…" | "Building a dam can affect…"</p>
<h4>Reading (10 min)</h4><p>Reliable baseload vs habitat loss and fish migration.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — Advantages/disadvantages — 2 each for hydro.</li><li><b>Body paragraph</b> — Complete hydro paragraph with advantage and disadvantage.</li></ul><p><b>Challenge:</b> Three Gorges Dam facts.</p>
<h4>Report work</h4><p>Balance required — not only praise for reliability.</p>
<h4>Exit check</h4><ul><li>use vocabulary accurately</li><li>complete workbook tasks</li><li>add to my glossary or report</li></ul>`,
  'L13A — What is Geothermal Energy?': `<h4>Hook (5 min)</h4><p>"Earth's core is hotter than the sun's surface — what could that heat do?"</p>
<h4>Word Work (5 min)</h4><ul><li><b>geothermal</b> — relating to the heat produced inside the Earth</li><li><b>magma</b> — molten rock found beneath the Earth's crust</li><li><b>geologist</b> — a scientist who studies the structure and materials of the Earth</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> Heat beneath feet — why not used everywhere?<br><i>Tip:</i> Need accessible hot water/steam; geology varies.</li><li><b>Q2:</b> Iceland heats homes with geothermal — what does your region have?<br><i>Tip:</i> Local geology, hot springs, volcanic zones.</li><li><b>Q3:</b> Drill deep enough anywhere — always find usable heat?<br><i>Tip:</i> Depth, cost, temperature — not all sites economic.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Prefix: geo-</b> — geothermal, geology, geography.</p><p>geo- = Earth. How does each word relate?</p>
<h4>Report thread</h4><p>Glossary: geothermal, magma, geologist.</p>`,
  'L13B — Content': `<h4>Sentence work (10 min)</h4><p><b>Analyse</b></p><p>Model: "Geothermal energy taps into the immense heat stored deep within the Earth's crust."</p><p>Prepositional phrase, adjective, technical vocab.</p><p><i>Starters:</i> "Geothermal energy comes from…" | "The heat inside the Earth is…"</p>
<h4>Reading (10 min)</h4><p>Core heat, hot springs, Iceland and New Zealand examples.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — What is geothermal? Where from? 2 facts.</li><li><b>Glossary</b> — Add geothermal, magma, geologist.</li></ul><p><b>Challenge:</b> Which country uses most geothermal — why?</p>
<h4>Report work</h4><p>Location-specific facts strengthen report — mention volcanic zones.</p>
<h4>Exit check</h4><ul><li>use vocabulary accurately</li><li>complete workbook tasks</li><li>add to my glossary or report</li></ul>`,
  'L14A — How Geothermal Plants Work': `<h4>Hook (5 min)</h4><p>"Drill a well anywhere for geothermal — where would you choose?"</p>
<h4>Word Work (5 min)</h4><ul><li><b>geyser</b> — a hot spring that regularly shoots steam and water into the air</li><li><b>steam</b> — water in gas form, produced when water is heated to boiling point</li><li><b>drill</b> — to bore deep holes into the Earth's surface to reach hot water</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> Steam like a gigantic kettle — what happens underground?<br><i>Tip:</i> Hot rock heats groundwater; pressure builds.</li><li><b>Q2:</b> Sites cool over decades — renewable or not?<br><i>Tip:</i> Replenishment rate vs extraction — nuanced answer.</li><li><b>Q3:</b> Quiet geothermal vs noisy wind farm — preference?<br><i>Tip:</i> Land use, reliability, local context.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Suffix: -ist</b> — geologist, scientist, specialist.</p><p>-ist = person who. What does each study?</p>
<h4>Report thread</h4><p>Geothermal topic sentence on L14B.</p>`,
  'L14B — Content': `<h4>Sentence work (10 min)</h4><p><b>Combine</b></p><p>Model: "Steam rises from underground. It powers a generator."</p><p>Participial phrase — start "Steam rising from underground…"</p><p><i>Starters:</i> "Geothermal plants work by…" | "Engineers drill wells to…"</p>
<h4>Reading (10 min)</h4><p>Wells, steam, turbines, reinjection, heat pumps.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — Topic sentence on how geothermal plants work — include steam.</li><li><b>Body paragraph</b> — Start geothermal body paragraph.</li></ul><p><b>Challenge:</b> Why Iceland uses geothermal effectively.</p>
<h4>Report work</h4><p>Continuous generation is key advantage to mention.</p>
<h4>Exit check</h4><ul><li>use vocabulary accurately</li><li>complete workbook tasks</li><li>add to my glossary or report</li></ul>`,
  'L15A — Geothermal Pros and Cons': `<h4>Hook (5 min)</h4><p>"Geothermal works 24 hours — big advantage over solar and wind?"</p>
<h4>Word Work (5 min)</h4><ul><li><b>limited</b> — restricted to certain places or amounts; not available everywhere</li><li><b>volcanic</b> — relating to or produced by a volcano or volcanic activity</li><li><b>harness</b> — to capture and control a natural force to use as energy</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> Best near plate boundaries — most people don't live there. Fair?<br><i>Tip:</i> Geography and equity in energy access.</li><li><b>Q2:</b> Drilling costs a fortune — who pays?<br><i>Tip:</i> Public vs private investment.</li><li><b>Q3:</b> Steam may contain deep gases — still "clean"?<br><i>Tip:</i> Low emissions vs zero — precision in vocabulary.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Suffix: -ic</b> — volcanic, geothermic, geographic.</p><p>-ic adjectives from nouns. Name the source noun.</p>
<h4>Report thread</h4><p>Geothermal pros/cons and body paragraph completion.</p>`,
  'L15B — Content': `<h4>Sentence work (10 min)</h4><p><b>Starters</b></p><p>Model: "(Evaluation)"</p><p>Advantage and limitation sentences for geothermal.</p><p><i>Starters:</i> "An advantage of geothermal energy is…" | "This energy type is limited to…"</p>
<h4>Reading (10 min)</h4><p>24/7 reliability, location limits, earthquake risk, low emissions.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — Advantages/disadvantages — 2 each.</li><li><b>Body paragraph</b> — Complete geothermal paragraph with advantage and disadvantage.</li></ul><p><b>Challenge:</b> Compare geothermal with another renewable.</p>
<h4>Report work</h4><p>Fourth energy paragraph — check consistent structure across types.</p>
<h4>Exit check</h4><ul><li>use vocabulary accurately</li><li>complete workbook tasks</li><li>add to my glossary or report</li></ul>`,
  'L16A — What is Tidal Energy?': `<h4>Hook (5 min)</h4><p>"Watched tide come in and out — what causes that?"</p>
<h4>Word Work (5 min)</h4><ul><li><b>tidal</b> — relating to the regular rise and fall of sea levels caused by the Moon</li><li><b>gravitational pull</b> — the force of gravity attracting one large object toward another</li><li><b>predictable</b> — able to be known or expected in advance with certainty</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> Moon pulls ocean twice daily — more predictable than wind or sun?<br><i>Tip:</i> Tidal tables years ahead — reliability argument.</li><li><b>Q2:</b> Dramatic tides vs flat coasts — where does tidal power fit?<br><i>Tip:</i> Tidal range determines feasibility.</li><li><b>Q3:</b> Before machines, how did humans use tides?<br><i>Tip:</i> Mills, fishing, transport — historical context.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Suffixes: -able / -ible</b> — predictable, reliable, possible.</p><p>Which use -able vs -ible? Can students find a rule?</p>
<h4>Report thread</h4><p>Glossary: tidal, gravitational pull, predictable.</p>`,
  'L16B — Content': `<h4>Sentence work (10 min)</h4><p><b>Analyse</b></p><p>Model: "The Moon's gravitational pull causes ocean tides, which rise and fall twice each day."</p><p>Relative clause; cause-and-effect language.</p><p><i>Starters:</i> "Tidal energy is caused by…" | "An advantage of tidal energy is…"</p>
<h4>Reading (10 min)</h4><p>Moon's gravity, tidal bulge, predictability vs solar/wind.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — What is tidal energy? Cause? Why predictable?</li><li><b>Glossary</b> — Add tidal, gravitational pull, predictable.</li></ul><p><b>Challenge:</b> Why tidal is more predictable than solar or wind.</p>
<h4>Report work</h4><p>Predictability is unique selling point for tidal in report.</p>
<h4>Exit check</h4><ul><li>use vocabulary accurately</li><li>complete workbook tasks</li><li>add to my glossary or report</li></ul>`,
  'L17A — How Tidal Energy is Captured': `<h4>Hook (5 min)</h4><p>"Tidal barrage like a dam at river mouth — what challenges?"</p>
<h4>Word Work (5 min)</h4><ul><li><b>tidal barrage</b> — a dam-like structure built across a tidal estuary to capture energy</li><li><b>estuary</b> — the wide mouth of a river where it meets the sea</li><li><b>tidal stream generator</b> — an underwater turbine placed in areas of strong tidal current</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> Underwater turbines like windmills — seabed challenges?<br><i>Tip:</i> Corrosion, maintenance, marine life, shipping.</li><li><b>Q2:</b> Tide timing vs peak electricity use — storage?<br><i>Tip:</i> Demand mismatch; grid planning.</li><li><b>Q3:</b> Ocean building expensive — when worth it vs other renewables?<br><i>Tip:</i> Coastal nations with large tidal ranges.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Suffix: -ary</b> — estuary, primary, secondary.</p><p>Add two more -ary words.</p>
<h4>Report thread</h4><p>Tidal topic sentence on L17B.</p>`,
  'L17B — Content': `<h4>Sentence work (10 min)</h4><p><b>Combine</b></p><p>Model: "Tidal barrages are built across estuaries. They capture the energy of rising and falling tides."</p><p>Participial phrase: "Tidal barrages, built across estuaries, …"</p><p><i>Starters:</i> "A tidal barrage captures energy by…" | "Tidal stream generators work like…"</p>
<h4>Reading (10 min)</h4><p>Barrages vs stream generators; developing technology.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — Topic sentence on how tidal energy is captured — use barrage or estuary.</li><li><b>Body paragraph</b> — Start tidal body paragraph.</li></ul><p><b>Challenge:</b> Research one real tidal energy project.</p>
<h4>Report work</h4><p>Fifth and final energy-type section — compare structure to prior four.</p>
<h4>Exit check</h4><ul><li>use vocabulary accurately</li><li>complete workbook tasks</li><li>add to my glossary or report</li></ul>`,
  'L18A — Comparing All Five Energy Types': `<h4>Hook (5 min)</h4><p>"Advising Australia on renewable investment — which would you choose?"</p>
<h4>Word Work (5 min)</h4><ul><li><b>compare</b> — to examine the similarities and differences between things</li><li><b>contrast</b> — to highlight the differences between two or more things</li><li><b>advantage</b> — a positive feature or benefit of something</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> Only one renewable for your country — which and what do you sacrifice?<br><i>Tip:</i> Trade-offs: reliability, location, cost, environment.</li><li><b>Q2:</b> What does local geography favour — sun, wind, water, heat, tides?<br><i>Tip:</i> Australia: solar and wind strong; tidal on coasts; geo limited.</li><li><b>Q3:</b> 100% renewable town — morning rush vs calm nights?<br><i>Tip:</i> Energy mix, storage, baseload from hydro/geo.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Prefix: ad-</b> — advantage, adapt, advance.</p><p>ad- means "toward." Two more ad- words.</p>
<h4>Report thread</h4><p>Comparison table feeds conclusion and report organisation.</p>`,
  'L18B — Content': `<h4>Sentence work (10 min)</h4><p><b>Starters</b></p><p>Model: "(Comparison)"</p><p>Contrast sentences across energy types.</p><p><i>Starters:</i> "Solar energy is best suited to…" | "The main difference between [X] and [Y] is…"</p>
<h4>Reading (10 min)</h4><p>Renewable mix — no single source meets all needs.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — Comparison table: How it works / Advantage / Disadvantage / Best location for all 5.</li><li><b>Review</b> — Complete all five body topic sentences — teacher feedback.</li></ul><p><b>Challenge:</b> Infographic comparing two energy types.</p>
<h4>Report work</h4><p>End of content phase — all five topic sentences ready for Week 7 drafting.</p>
<h4>Exit check</h4><ul><li>use vocabulary accurately</li><li>complete workbook tasks</li><li>add to my glossary or report</li></ul>`,
  'L19A — Information Report Structure': `<h4>Hook (5 min)</h4><p>"What do you know about information reports? What sections?"</p>
<h4>Word Work (5 min)</h4><ul><li><b>introduction</b> — the opening section that defines and contextualises the topic</li><li><b>general statement</b> — a broad opening sentence that defines or classifies the topic</li><li><b>technical language</b> — specialist words used for a particular subject area</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> News hooks with drama; reports inform — how is your job different?<br><i>Tip:</i> Objective, present tense, facts not opinion.</li><li><b>Q2:</b> Reader reads only intro and conclusion — what must those achieve?<br><i>Tip:</i> Define topic; summarise without new facts.</li><li><b>Q3:</b> Why do headings matter more in reports than stories?<br><i>Tip:</i> Navigation, subtopics, scan-ability.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Prefix: intro-</b> — introduction, introduce, introvert.</p><p>intro- means "into." Apply to each word.</p>
<h4>Report thread</h4><p>Report plan begins — press A to preview written task criteria.</p>`,
  'L19B — Content': `<h4>Sentence work (10 min)</h4><p><b>Analyse</b></p><p>Model: "Renewable energy is a broad term that describes any energy source naturally replenished by the environment."</p><p>Defining relative clause; circle technical language.</p><p><i>Starters:</i> "An information report is a type of writing that…" | "The three main sections are…"</p>
<h4>Reading (10 min)</h4><p>Report structure: intro, body, conclusion; formal present tense.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — Draw 3-part structure: Introduction / Body / Conclusion.</li><li><b>Planning</b> — List report sections — show plan to teacher.</li></ul><p><b>Challenge:</b> Find published report — identify intro, body, conclusion.</p>
<h4>Report work</h4><p>Plan should list five body subheadings (one per energy type). Open assessment overlay.</p>
<h4>Exit check</h4><ul><li>follow report structure</li><li>draft or revise my report</li><li>use formal present-tense language</li></ul>`,
  'L20A — Writing an Introduction': `<h4>Hook (5 min)</h4><p>"What should the first sentence of your report do? Why does it matter?"</p>
<h4>Word Work (5 min)</h4><ul><li><b>paragraph</b> — a group of sentences about one connected idea</li><li><b>topic sentence</b> — the opening sentence of a paragraph, stating the main idea</li><li><b>elaboration</b> — adding more detail, examples or explanation to support an idea</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> Make readers care without hype — how sound interesting but factual?<br><i>Tip:</i> Strong general statement, not sensationalism.</li><li><b>Q2:</b> Mention all five types in intro or focus on one?<br><i>Tip:</i> Preview structure — signpost subtopics briefly.</li><li><b>Q3:</b> Topic sentence vs hook — can one sentence do both?<br><i>Tip:</i> In reports, general statement often serves both.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Suffix: -tion</b> — introduction, elaboration, information.</p><p>Remove -tion. What verb remains?</p>
<h4>Report thread</h4><p>Draft introduction on L20B — use general statement from L3 if strong.</p>`,
  'L20B — Content': `<h4>Sentence work (10 min)</h4><p><b>Combine</b></p><p>Model: "Solar energy is clean. It does not produce harmful gases. It can be used wherever the sun shines."</p><p>Join all three into one fluent sentence.</p><p><i>Starters:</i> "Renewable energy is a broad term that…" | "In this report, I will discuss…"</p>
<h4>Reading (10 min)</h4><p>Strong intro: general statement, background, 2–4 sentences, no opinion.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — Identify effective general statement in model intro.</li><li><b>Draft introduction</b> — 3–4 sentences: general statement + background + topics covered.</li></ul><p><b>Challenge:</b> Evaluate a published report introduction.</p>
<h4>Report work</h4><p>Conference — formal tone, present tense, no "I think."</p>
<h4>Exit check</h4><ul><li>follow report structure</li><li>draft or revise my report</li><li>use formal present-tense language</li></ul>`,
  'L21A — Writing Body Paragraphs': `<h4>Hook (5 min)</h4><p>"Why body paragraphs? What makes one strong?"</p>
<h4>Word Work (5 min)</h4><ul><li><b>conclusion</b> — the closing section that summarises the key points of a report</li><li><b>summarise</b> — to give the main points of something briefly and clearly</li><li><b>evidence</b> — facts or information that support a claim or argument</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> One strong detail beats three weak ones — how choose facts?<br><i>Tip:</i> Relevance to topic sentence; accuracy; specificity.</li><li><b>Q2:</b> Technical words like photovoltaic — when help vs confuse?<br><i>Tip:</i> Define or use in context; glossary supports reader.</li><li><b>Q3:</b> Two paragraphs on advantages — how avoid repetition?<br><i>Tip:</i> One subtopic per paragraph; vary sentence openings.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Prefix: con-</b> — conclusion, compare, contrast.</p><p>con- means "together" or "with." Apply to each.</p>
<h4>Report thread</h4><p>TEEL structure taught explicitly — feeds Week 8 drafting.</p>`,
  'L21B — Content': `<h4>Sentence work (10 min)</h4><p><b>Starters</b></p><p>Model: "(TEEL practice)"</p><p>Body paragraph using Topic → Evidence → Explanation → Link.</p><p><i>Starters:</i> "One type of renewable energy is… It works by…" | "A key advantage of [X] is…"</p>
<h4>Reading (10 min)</h4><p>Body paragraphs: topic sentence, elaboration, technical vocab, linking sentence.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Note-taking</b> — Practise one TEEL paragraph in workbook.</li><li><b>Draft paragraph</b> — Full solar body paragraph — teacher feedback before Week 8.</li></ul><p><b>Challenge:</b> Second body paragraph on another energy type.</p>
<h4>Report work</h4><p>Mark against rubric: structure, vocabulary, accuracy. Due date 28 Aug on screen.</p>
<h4>Exit check</h4><ul><li>follow report structure</li><li>draft or revise my report</li><li>use formal present-tense language</li></ul>`,
  'L22A — Using the InfoReport Tool': `<h4>Hook (5 min)</h4><p>"What should a reader know after your report? Most important message?"</p>
<h4>Word Work (5 min)</h4><ul><li><b>structure</b> — the way a piece of writing is organised into sections</li><li><b>heading</b> — a title that introduces a section of writing</li><li><b>subheading</b> — a smaller title that introduces a subsection within a section</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> Screen writing vs paper — advantage of digital tool?<br><i>Tip:</i> Easy revise, headings, word count, structure prompts.</li><li><b>Q2:</b> Research and writing together — keep facts separate from opinion?<br><i>Tip:</i> Notes panel vs draft; cite sources in workbook.</li><li><b>Q3:</b> Tool suggests structure — follow or adapt?<br><i>Tip:</i> Match assessment: intro, 5 body sections, conclusion.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Suffix: -ing</b> — heading, writing, organising.</p><p>Does root word change when adding -ing?</p>
<h4>Report thread</h4><p>Open planomy.github.io/inforeport — introduction typed on L22B.</p>`,
  'L22B — Content': `<h4>Sentence work (10 min)</h4><p><b>Analyse</b></p><p>Model: "An information report begins with a general statement that defines or classifies the topic for the reader."</p><p>Purpose of sentence; defining relative clause.</p><p><i>Starters:</i> "Renewable energy is energy that…" | "This report will discuss…"</p>
<h4>Reading (10 min)</h4><p>Begin InfoReport drafting; use seven weeks of notes and glossary.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Open InfoReport</b> — planomy.github.io/inforeport</li><li><b>Type introduction</b> — Use Lesson 20 draft.</li></ul><p><b>Challenge:</b> Extra section on future of renewable energy.</p>
<h4>Report work</h4><p>Supervised session — authentication strategy. Check students use own words.</p>
<h4>Exit check</h4><ul><li>follow report structure</li><li>draft or revise my report</li><li>use formal present-tense language</li></ul>`,
  'L23A — Drafting Body Sections': `<h4>Hook (5 min)</h4><p>"Most interesting discovery in 7 weeks?" Share — builds motivation for drafting.</p>
<h4>Word Work (5 min)</h4><ul><li><b>draft</b> — an early version of a piece of writing, not yet finished or polished</li><li><b>revise</b> — to read through and improve a piece of writing</li><li><b>proofread</b> — to check a piece of writing carefully for errors</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> First draft should be messy — what leave imperfect?<br><i>Tip:</i> Content first; polish in L24.</li><li><b>Q2:</b> Hardest energy type to explain — what would confused reader ask?<br><i>Tip:</i> Target conferencing on weak section.</li><li><b>Q3:</b> Peer feedback — praise, questions, or corrections most helpful?<br><i>Tip:</i> Model constructive comments.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Prefix: re-</b> — revise, rewrite, review.</p><p>re- = again. What is the action of each?</p>
<h4>Report thread</h4><p>All five body sections completed on L23B.</p>`,
  'L23B — Content': `<h4>Sentence work (10 min)</h4><p><b>Combine</b></p><p>Model: "Solar energy uses sunlight. Wind energy uses moving air."</p><p>Contrast connector: "While solar energy uses sunlight, …"</p><p><i>Starters:</i> "[Energy type] is a form of renewable energy that…" | "One advantage is… However, one disadvantage is…"</p>
<h4>Reading (10 min)</h4><p>Each section: topic sentence, 2+ details, closing; evidence from passages and glossary.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Check sections</b> — Topic sentence ✓ 2 details ✓ closing ✓</li><li><b>Body sections</b> — Complete all five in InfoReport from notes and drafts.</li></ul><p><b>Challenge:</b> Statistics in at least two sections.</p>
<h4>Report work</h4><p>Rubric: content knowledge on five types; advantages/disadvantages with evidence.</p>
<h4>Exit check</h4><ul><li>follow report structure</li><li>draft or revise my report</li><li>use formal present-tense language</li></ul>`,
  'L24A — Reviewing and Publishing': `<h4>Hook (5 min)</h4><p>"Friend asks what renewable energy is — how has your answer grown since Week 1?"</p>
<h4>Word Work (5 min)</h4><ul><li><b>publish</b> — to make a piece of writing available for an audience to read</li><li><b>audience</b> — the people who will read, watch or listen to a piece of work</li><li><b>purpose</b> — the reason a piece of writing was created</li></ul><p>Students copy definitions into workbook glossaries. Check pronunciation of technical terms.</p>
<h4>Discussion starters (15 min)</h4><ul><li><b>Q1:</b> Publishing — what would embarrass you if left in?<br><i>Tip:</i> Spelling errors, wrong facts, informal tone.</li><li><b>Q2:</b> Accuracy vs spelling — how verify online facts?<br><i>Tip:</i> Cross-check with unit readings and glossary.</li><li><b>Q3:</b> Real audience — teacher, younger students, or leaders?<br><i>Tip:</i> Purpose shapes language choices.</li></ul>
<h4>Spelling focus (5 min)</h4><p><b>Suffixes: -ence / -ance</b> — audience, evidence, importance.</p><p>When -ence vs -ance? One example of each.</p>
<h4>Report thread</h4><p>Final publish today — due 28 August 2026.</p>`,
  'L24B — Content': `<h4>Sentence work (10 min)</h4><p><b>Starters</b></p><p>Model: "(Conclusion)"</p><p>Conclusion sentences summarising without repeating.</p><p><i>Starters:</i> "In conclusion, renewable energy is important because…" | "As this report has shown…"</p>
<h4>Reading (10 min)</h4><p>Checklist before publish: intro, 5 sections, conclusion, vocab, proofread.</p><p>Read aloud or silent read, then students complete workbook notes before moving on.</p>
<h4>Do this (15 min)</h4><ul><li><b>Checklist</b> — ✓ intro ✓ 5 body sections ✓ conclusion ✓ vocab ✓ proofread</li><li><b>Publish</b> — Conclusion + proofread + publish at planomy.github.io/inforeport; copy to Word for OneNote.</li></ul><p><b>Challenge:</b> Peer-review classmate report — two specific suggestions.</p>
<h4>Report work</h4><p>Final submission: Word 12pt Arial, 200–400 words, OneNote. Celebrate completion.</p>
<h4>Exit check</h4><ul><li>follow report structure</li><li>draft or revise my report</li><li>use formal present-tense language</li></ul>`,
  '★ Report assessment (Week 8)': `<h4>Written report assessment</h4><p>Students publish an <b>information report</b> on renewable energy sources. Due <b>28 August 2026</b>. Press <b>A</b> for full task, rubric, and reading assessment tab.</p>

  'Keep writing clearly': `<h4>Unit complete</h4><p>Celebrate published reports and eight weeks of vocabulary, reading, sentence work, and information report writing.</p>

SLIDES.push({ nav:'L1A — What is Energy?', eyebrow:'Week 1 · Lesson 1 · Learn', eyebrowR:'Lesson 1 · Screen A', title:'What is Energy?', screenlbl:'Student screen 1 of 4', wideLeft:true, left:[{k:'read',heading:'Energy everywhere',body:['Everything students do — walking to the desk, heating lunch, streaming a lesson — needs <b>energy</b>. Scientists define energy as the ability to do work or cause change.','Energy travels through systems: the Sun\'s light grows food; food fuels bodies; power stations turn fuels into electricity for Brisbane classrooms.'],notice:'Energy is everywhere — even when we cannot see it moving.'},{k:'html', html:`<div class="card spell"><span class="tag read">SPELLING FOCUS — word ending: -ergy</span><p class="spell-words"><span>en·er·gy</span><span>syn·er·gy</span><span>al·ler·gy</span></p><p class="spell-hint">Copy each word. Underline the -ergy chunk in each one.</p></div>`}, {k:'hook', q:'Think of three things you did today that needed energy. Where did that energy come from?'}], right:[ {k:'win15', can:'define energy in my own words', prove:'Write a one-line definition without copying the slide.'},{k:'wp', list:[{t:'energy',d:'the ability to do work or make things happen'}, {t:'resource',d:'a supply of something useful that can be drawn on'}, {t:'fuel',d:'a material that releases energy when it is burned'}]},  {k:'img', hero:true, src:'energy-everyday.png', cap:'What is Energy?'}], notes:`<p>Week 1 · Lesson 1 · Learn — What is Energy?</p>` });
SLIDES.push({ nav:'L1B — Content', eyebrow:'Week 1 · Lesson 1 · Apply', eyebrowR:'Lesson 1 · Screen B', title:'Week 1 Lesson 1 — Content', screenlbl:'Student screen 2 of 4', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — Analyse</span><p style="margin-top:10px;font-size:16px;line-height:1.5">"The sun, wind and water are all powerful sources of renewable energy."</p><p style="margin-top:10px;font-size:16px;line-height:1.5">Your turn: Circle the noun groups. Underline the adjectives. Find the connecting word.</p><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "Energy is…"  |  "We use energy to…"  |  "One source of energy is…"</p></div>`}, {k:'read', heading:'Reading', body:['Energy is all around us. It lights our homes, cooks our food and moves our vehicles. Most of our energy today comes from burning fossil fuels — coal, oil and natural gas. These fuels formed from the remains of ancient plants and animals over millions of years. Once we burn them, they are gone forever. That is why scientists are searching for better, cleaner ways to produce the energy we need.', 'In your workbook: What is energy? List two ways we use energy every day. Use your own words.', 'Start your Glossary Doc. Add energy, resource and fuel with definitions in your own words.', '⭐ Challenge: Research one unusual energy source not covered in this unit.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'In your workbook: What is energy? List two ways we use energy every day. Use your own words.'}, {t:'Report Work — Glossary',d:'Start your Glossary Doc. Add energy, resource and fuel with definitions in your own words.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Research one unusual energy source not covered in this unit.</p></div>`}], notes:`<p>Week 1 · Lesson 1 · Apply — Week 1 Lesson 1 — Content</p>` });

SLIDES.push({ nav:'L2A — Renewable vs Non-Renewable', eyebrow:'Week 1 · Lesson 2 · Learn', eyebrowR:'Lesson 2 · Screen A', title:'Renewable vs. Non-Renewable', screenlbl:'Student screen 1 of 4', wideLeft:true, left:[{k:'read',heading:'Two kinds of energy sources',body:['Energy sources are often grouped as <b>renewable</b> (replaced by nature) or <b>non-renewable</b> (finite stocks like coal and oil).','Understanding the difference helps readers know why communities are switching to sun and wind across Queensland.']},{k:'html', html:`<div class="card spell"><span class="tag read">SPELLING FOCUS — prefix: re-</span><p class="spell-words"><span>re·new·a·ble</span><span>re·use</span><span>re·cy·cle</span><span>re·place</span></p><p class="spell-hint">What does re- mean? Write your own word using this prefix.</p></div>`}, {k:'hook', q:'What do the words "renewable" and "non-renewable" make you think of? Can you give an example of each?'}], right:[ {k:'win15', can:'name one renewable and one non-renewable source', prove:'Say both aloud with an everyday example each.'},{k:'wp', list:[{t:'renewable',d:'can be naturally replaced and will not run out'}, {t:'non-renewable',d:'cannot be replaced quickly; will eventually run out'}, {t:'fossil fuel',d:'coal, oil or natural gas formed from ancient living things'}]},  {k:'img', hero:true, src:'fossil-fuels.png', cap:'Renewable vs. Non-Renewable'}], notes:`<p>Week 1 · Lesson 2 · Learn — Renewable vs. Non-Renewable</p>` });
SLIDES.push({ nav:'L2B — Content', eyebrow:'Week 1 · Lesson 2 · Apply', eyebrowR:'Lesson 2 · Screen B', title:'Week 1 Lesson 2 — Content', screenlbl:'Student screen 2 of 4', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — Combine</span><p style="margin-top:10px;font-size:16px;line-height:1.5">"Fossil fuels are useful." "They are running out."</p><p style="margin-top:10px;font-size:16px;line-height:1.5">Your turn: Join into one complex sentence using although, but or however.</p><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "Although fossil fuels are useful…"  |  "Fossil fuels are useful; however…"</p></div>`}, {k:'read', heading:'Reading', body:['Energy sources belong to two groups: renewable and non-renewable. Non-renewable energy comes from fossil fuels — coal, oil and natural gas — which took millions of years to form and will eventually run out. Renewable energy comes from sources naturally replaced by the planet: sunlight, wind, flowing water and Earth\'s internal heat. These sources will not run out while our planet exists. Engineers worldwide are working to help us make the switch to clean, reliable energy.', 'Draw a T-chart in your workbook: Renewable | Non-Renewable. List at least 3 examples in each column.', 'Add renewable, non-renewable and fossil fuel to your Glossary Doc.', '⭐ Challenge: Create a visual showing how fossil fuels form over millions of years.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'Draw a T-chart in your workbook: Renewable | Non-Renewable. List at least 3 examples in each column.'}, {t:'Report Work — Glossary',d:'Add renewable, non-renewable and fossil fuel to your Glossary Doc.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Create a visual showing how fossil fuels form over millions of years.</p></div>`}], notes:`<p>Week 1 · Lesson 2 · Apply — Week 1 Lesson 2 — Content</p>` });

SLIDES.push({ nav:'L3A — Why Switch to Renewables?', eyebrow:'Week 1 · Lesson 3 · Learn', eyebrowR:'Lesson 3 · Screen A', title:'Why Switch to Renewables?', screenlbl:'Student screen 1 of 4', wideLeft:true, left:[{k:'read',heading:'Why communities switch',body:['Many countries, including Australia, are increasing <b>renewable energy</b> to lower <b>emissions</b> and act on <b>climate</b> risks.','Information reports explain these reasons with clear cause-and-effect language for readers in Year 5 and beyond.']},{k:'html', html:`<div class="card spell"><span class="tag read">SPELLING FOCUS — suffix: -able</span><p class="spell-words"><span>sus·tain·a·ble</span><span>re·new·a·ble</span><span>re·li·a·ble</span></p><p class="spell-hint">What does -able mean? Add one more word using this suffix.</p></div>`}, {k:'hook', q:'What problems might happen if we keep burning fossil fuels? Share your ideas.'}], right:[ {k:'win15', can:'explain why renewables matter in one sentence', prove:'Include people or the environment in your reason.'},{k:'wp', list:[{t:'sustainable',d:'able to continue long-term without harming the environment'}, {t:'emissions',d:'gases released into the air, especially by burning fuel'}, {t:'climate',d:'the long-term weather patterns of a region or the whole Earth'}]},  {k:'img', hero:true, src:'climate-change.png', cap:'Why Switch to Renewables?'}], notes:`<p>Week 1 · Lesson 3 · Learn — Why Switch to Renewables?</p>` });
SLIDES.push({ nav:'L3B — Content', eyebrow:'Week 1 · Lesson 3 · Apply', eyebrowR:'Lesson 3 · Screen B', title:'Week 1 Lesson 3 — Content', screenlbl:'Student screen 2 of 4', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — </span><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "Climate change occurs when…"  |  "One reason we need renewable energy is…"</p></div>`}, {k:'read', heading:'Reading', body:['Burning fossil fuels releases carbon dioxide and greenhouse gases into the atmosphere. These gases trap heat from the sun, causing the Earth\'s temperature to rise — an effect called climate change. Scientists warn this leads to more extreme weather, rising sea levels and damage to ecosystems. Switching to renewable energy produces little or no greenhouse gases, helping to slow climate change and reducing our dependence on imported fuels.', 'Write two reasons why renewable energy is important for the planet. Use evidence from the reading.', 'Write one general statement about renewable energy for your report introduction. Share with your teacher.', '⭐ Challenge: Find a recent news article about climate change. Summarise it in 3 sentences.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'Write two reasons why renewable energy is important for the planet. Use evidence from the reading.'}, {t:'Report Work — General Statement',d:'Write one general statement about renewable energy for your report introduction. Share with your teacher.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Find a recent news article about climate change. Summarise it in 3 sentences.</p></div>`}], notes:`<p>Week 1 · Lesson 3 · Apply — Week 1 Lesson 3 — Content</p>` });

SLIDES.push({ nav:'L4B — Content', eyebrow:'Week 2 · Lesson 4 · Apply', eyebrowR:'Lesson 4 · Screen B', title:'Week 2 Lesson 4 — Content', screenlbl:'Student screen 2 of 4', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — Analyse</span><p style="margin-top:10px;font-size:16px;line-height:1.5">"Photovoltaic panels convert sunlight directly into electrical energy using tiny silicon cells."</p><p style="margin-top:10px;font-size:16px;line-height:1.5">Your turn: Find the verb group. Circle the technical vocabulary. Identify the noun group.</p><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "Solar energy is…"  |  "The sun produces energy by…"  |  "Solar panels work by…"</p></div>`}, {k:'read', heading:'Reading', body:['Solar energy comes from the sun — the most powerful energy source in our solar system. Every hour, the sun sends enough energy to Earth to power the world for an entire year. Solar energy can be captured as heat (solar thermal energy) or as electricity through the photovoltaic effect. Today, solar panels on rooftops and in large solar farms convert sunlight directly into electricity that powers homes, schools and businesses.', 'Record in your workbook: What is solar energy? Where does it come from? Give 2 facts.', 'Add solar and photovoltaic to your Glossary Doc with definitions in your own words.', '⭐ Challenge: Find out which country gets the most solar energy and explain why.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'Record in your workbook: What is solar energy? Where does it come from? Give 2 facts.'}, {t:'Report Work — Glossary',d:'Add solar and photovoltaic to your Glossary Doc with definitions in your own words.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Find out which country gets the most solar energy and explain why.</p></div>`}], notes:`<p>Week 2 · Lesson 4 · Apply — Week 2 Lesson 4 — Content</p>` });

SLIDES.push({ nav:'L5B — Content', eyebrow:'Week 2 · Lesson 5 · Apply', eyebrowR:'Lesson 5 · Screen B', title:'Week 2 Lesson 5 — Content', screenlbl:'Student screen 2 of 4', wideLeft:true, left:[{k:'html', html:`<div class="card cream"><span class="tag do">SENTENCE WORK — Combine</span><p style="margin-top:10px;font-size:16px;line-height:1.5">"Solar panels collect sunlight." "They turn it into electricity."</p><p style="margin-top:10px;font-size:16px;line-height:1.5">Your turn: Join into one sentence using which, and convert or to.</p><p style="margin-top:10px;font-size:14px;color:#4a5a54">Starters: "A solar panel works by…"  |  "When sunlight hits the panel…"</p></div>`}, {k:'read', heading:'Reading', body:['Solar panels work using the photovoltaic effect. Inside each panel are tiny cells made of silicon — a material that reacts when sunlight hits it. When light strikes a silicon cell, it knocks electrons loose, creating a flow of electricity called direct current (DC). Because most homes use alternating current (AC), the electricity passes through a device called an inverter to convert it. It can then be used immediately, stored in a battery, or fed into the electricity grid.', 'Draw and label a simple diagram showing how a solar panel generates electricity. Include key terms.', 'Write a topic sentence about solar energy for your report body paragraph.', '⭐ Challenge: Research the photovoltaic effect and explain it in your own words.']}], right:[{k:'steps', label:'Do this', rows:[{t:'Note-taking',d:'Draw and label a simple diagram showing how a solar panel generates electricity. Include key terms.'}, {t:'Report Work — Topic Sentence',d:'Write a topic sentence about solar energy for your report body paragraph.'}]}, {k:'html', html:`<div class="card dark"><span class="tag try">CHALLENGE</span><p style="margin-top:10px;color:var(--ink);font-size:15px;line-height:1.5">⭐ Challenge: Research the photovoltaic effect and explain it in your own words.</p></div>`}], notes:`<p>Week 2 · Lesson 5 · Apply — Week 2 Lesson 5 — Content</p>` });
