document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

y:var(--sans);font-size:15px;font-weight:700;color:var(--white);flex-shrink:0;\">7<\u002Fdiv><span style=\"font-family:var(--sans);font-size:23px;color:var(--white);\">Planning Your Report<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:14px;\"><div style=\"width:34px;height:34px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-family:var(--sans);font-size:15px;font-weight:700;color:var(--white);flex-shrink:0;\">8<\u002Fdiv><span style=\"font-family:var(--sans);font-size:23px;color:var(--white);font-weight:600;\">Report Writing Week<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W1L1 A -->\n<section data-label=\"W1·L1\" data-screen-label=\"Week 1 Lesson 1 — What is Energy?\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 1 · Lesson 1 · What is Energy?<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:68px;color:var(--white);line-height:1.18;\">What is Energy?<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">Think of three things you did today that needed energy. Where did that energy come from?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>energy<\u002Fstrong> — the ability to do work or make things happen<\u002Fli>\n          <li><strong>resource<\u002Fstrong> — a supply of something useful that can be drawn on<\u002Fli>\n          <li><strong>fuel<\u002Fstrong> — a material that releases energy when it is burned<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — word ending: <em style=\"color:var(--white);\">-ergy<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">en·er·gy &nbsp;&nbsp; syn·er·gy &nbsp;&nbsp; al·ler·gy<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\">Copy each word. Underline the <strong style=\"color:var(--white);\">-ergy<\u002Fstrong> chunk in each one.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W1L1 B -->\n<section data-label=\"W1·L1–B\" data-screen-label=\"Week 1 Lesson 1 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 1 · Lesson 1 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Analyse<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.5;margin-bottom:12px;\">\"The sun, wind and water are all powerful sources of renewable energy.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Circle the noun groups. Underline the adjectives. Find the connecting word.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"Energy is…\" &nbsp;|&nbsp; \"We use energy to…\" &nbsp;|&nbsp; \"One source of energy is…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>Energy is all around us. It lights our homes, cooks our food and moves our vehicles. Most of our energy today comes from burning fossil fuels — coal, oil and natural gas. These fuels formed from the remains of ancient plants and animals over millions of years. Once we burn them, they are gone forever. That is why scientists are searching for better, cleaner ways to produce the energy we need.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">In your workbook: <strong>What is energy?<\u002Fstrong> List two ways we use energy every day. Use your own words.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Glossary<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Start your <strong>Glossary Doc<\u002Fstrong>. Add <em>energy<\u002Fem>, <em>resource<\u002Fem> and <em>fuel<\u002Fem> with definitions in your own words.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Research one unusual energy source not covered in this unit.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W1L2 A -->\n<section data-label=\"W1·L2\" data-screen-label=\"Week 1 Lesson 2 — Renewable vs Non-Renewable\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 1 · Lesson 2 · Renewable vs. Non-Renewable<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:62px;color:var(--white);line-height:1.18;\">Renewable vs.<br>Non-Renewable<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">What do the words \"renewable\" and \"non-renewable\" make you think of? Can you give an example of each?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>renewable<\u002Fstrong> — can be naturally replaced and will not run out<\u002Fli>\n          <li><strong>non-renewable<\u002Fstrong> — cannot be replaced quickly; will eventually run out<\u002Fli>\n          <li><strong>fossil fuel<\u002Fstrong> — coal, oil or natural gas formed from ancient living things<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — prefix: <em style=\"color:var(--white);\">re-<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">re·new·a·ble &nbsp;&nbsp; re·use &nbsp;&nbsp; re·cy·cle &nbsp;&nbsp; re·place<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\">What does <strong style=\"color:var(--white);\">re-<\u002Fstrong> mean? Write your own word using this prefix.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W1L2 B -->\n<section data-label=\"W1·L2–B\" data-screen-label=\"Week 1 Lesson 2 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 1 · Lesson 2 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Combine<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.5;margin-bottom:10px;\">\"Fossil fuels are useful.\"<br>\"They are running out.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Join into one complex sentence using <em>although<\u002Fem>, <em>but<\u002Fem> or <em>however<\u002Fem>.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"Although fossil fuels are useful…\" &nbsp;|&nbsp; \"Fossil fuels are useful; however…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>Energy sources belong to two groups: renewable and non-renewable. Non-renewable energy comes from fossil fuels — coal, oil and natural gas — which took millions of years to form and will eventually run out. Renewable energy comes from sources naturally replaced by the planet: sunlight, wind, flowing water and Earth's internal heat. These sources will not run out while our planet exists. Engineers worldwide are working to help us make the switch to clean, reliable energy.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Draw a <strong>T-chart<\u002Fstrong> in your workbook: <em>Renewable<\u002Fem> | <em>Non-Renewable<\u002Fem>. List at least 3 examples in each column.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Glossary<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Add <em>renewable<\u002Fem>, <em>non-renewable<\u002Fem> and <em>fossil fuel<\u002Fem> to your Glossary Doc.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Create a visual showing how fossil fuels form over millions of years.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W1L3 A -->\n<section data-label=\"W1·L3\" data-screen-label=\"Week 1 Lesson 3 — Why Switch to Renewables?\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 1 · Lesson 3 · Why Switch to Renewables?<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:62px;color:var(--white);line-height:1.18;\">Why Switch to<br>Renewables?<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">What problems might happen if we keep burning fossil fuels? Share your ideas.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>sustainable<\u002Fstrong> — able to continue long-term without harming the environment<\u002Fli>\n          <li><strong>emissions<\u002Fstrong> — gases released into the air, especially by burning fuel<\u002Fli>\n          <li><strong>climate<\u002Fstrong> — the long-term weather patterns of a region or the whole Earth<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — suffix: <em style=\"color:var(--white);\">-able<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">sus·tain·a·ble &nbsp;&nbsp; re·new·a·ble &nbsp;&nbsp; re·li·a·ble<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\">What does <strong style=\"color:var(--white);\">-able<\u002Fstrong> mean? Add one more word using this suffix.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W1L3 B -->\n<section data-label=\"W1·L3–B\" data-screen-label=\"Week 1 Lesson 3 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 1 · Lesson 3 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Fix-it <span style=\"color:#c0392b;font-size:15px;\">(3 errors)<\u002Fspan><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.55;margin-bottom:12px;\">\"fossil fuels is made from ancient plants and animals that died million of years ago.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Find and fix 3 errors. Look for: capital letters, verb agreement, plural nouns.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"Climate change occurs when…\" &nbsp;|&nbsp; \"One reason we need renewable energy is…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>Burning fossil fuels releases carbon dioxide and greenhouse gases into the atmosphere. These gases trap heat from the sun, causing the Earth's temperature to rise — an effect called climate change. Scientists warn this leads to more extreme weather, rising sea levels and damage to ecosystems. Switching to renewable energy produces little or no greenhouse gases, helping to slow climate change and reducing our dependence on imported fuels.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Write <strong>two reasons<\u002Fstrong> why renewable energy is important for the planet. Use evidence from the reading.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — General Statement<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Write one <strong>general statement<\u002Fstrong> about renewable energy for your report introduction. Share with your teacher.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Find a recent news article about climate change. Summarise it in 3 sentences.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W2L4 A -->\n<section data-label=\"W2·L4\" data-screen-label=\"Week 2 Lesson 4 — What is Solar Energy?\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 2 · Lesson 4 · What is Solar Energy?<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:66px;color:var(--white);line-height:1.18;\">What is Solar Energy?<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">On a sunny day, have you noticed how warm a dark surface gets? Where does that heat come from?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>solar<\u002Fstrong> — relating to or produced by the sun<\u002Fli>\n          <li><strong>photovoltaic<\u002Fstrong> — converting light energy directly into electricity<\u002Fli>\n          <li><strong>panel<\u002Fstrong> — a flat surface device that collects sunlight<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — prefix: <em style=\"color:var(--white);\">photo-<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">pho·to·vol·ta·ic &nbsp;&nbsp; pho·to·graph &nbsp;&nbsp; pho·to·syn·the·sis<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\">What does <strong style=\"color:var(--white);\">photo-<\u002Fstrong> mean in Greek? How does it link each word?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W2L4 B -->\n<section data-label=\"W2·L4–B\" data-screen-label=\"Week 2 Lesson 4 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 2 · Lesson 4 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Analyse<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.5;margin-bottom:12px;\">\"Photovoltaic panels convert sunlight directly into electrical energy using tiny silicon cells.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Find the verb group. Circle the technical vocabulary. Identify the noun group.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"Solar energy is…\" &nbsp;|&nbsp; \"The sun produces energy by…\" &nbsp;|&nbsp; \"Solar panels work by…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>Solar energy comes from the sun — the most powerful energy source in our solar system. Every hour, the sun sends enough energy to Earth to power the world for an entire year. Solar energy can be captured as heat (solar thermal energy) or as electricity through the photovoltaic effect. Today, solar panels on rooftops and in large solar farms convert sunlight directly into electricity that powers homes, schools and businesses.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Record in your workbook: <strong>What is solar energy?<\u002Fstrong> Where does it come from? Give 2 facts.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Glossary<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Add <em>solar<\u002Fem> and <em>photovoltaic<\u002Fem> to your Glossary Doc with definitions in your own words.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Find out which country gets the most solar energy and explain why.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W2L5 A -->\n<section data-label=\"W2·L5\" data-screen-label=\"Week 2 Lesson 5 — How Solar Panels Work\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 2 · Lesson 5 · How Solar Panels Work<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:66px;color:var(--white);line-height:1.18;\">How Solar<br>Panels Work<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">If you were designing a solar-powered house, where would you put the panels? Why?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>electricity<\u002Fstrong> — energy that flows as a current through wires and devices<\u002Fli>\n          <li><strong>convert<\u002Fstrong> — to change something from one form to another<\u002Fli>\n          <li><strong>silicon<\u002Fstrong> — a material used in solar cells that reacts to sunlight<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — suffix: <em style=\"color:var(--white);\">-ity<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">e·lec·tric·i·ty &nbsp;&nbsp; ca·pac·i·ty &nbsp;&nbsp; ac·tiv·i·ty<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\">Remove <strong style=\"color:var(--white);\">-ity<\u002Fstrong> from each word. What root word is left?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W2L5 B -->\n<section data-label=\"W2·L5–B\" data-screen-label=\"Week 2 Lesson 5 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 2 · Lesson 5 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Combine<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.5;margin-bottom:10px;\">\"Solar panels collect sunlight.\"<br>\"They turn it into electricity.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Join into one sentence using <em>which<\u002Fem>, <em>and convert<\u002Fem> or <em>to<\u002Fem>.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"A solar panel works by…\" &nbsp;|&nbsp; \"When sunlight hits the panel…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>Solar panels work using the photovoltaic effect. Inside each panel are tiny cells made of silicon — a material that reacts when sunlight hits it. When light strikes a silicon cell, it knocks electrons loose, creating a flow of electricity called direct current (DC). Because most homes use alternating current (AC), the electricity passes through a device called an inverter to convert it. It can then be used immediately, stored in a battery, or fed into the electricity grid.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Draw and label a simple diagram showing how a solar panel generates electricity. Include key terms.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Topic Sentence<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Write a <strong>topic sentence<\u002Fstrong> about solar energy for your report body paragraph.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Research the photovoltaic effect and explain it in your own words.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W2L6 A -->\n<section data-label=\"W2·L6\" data-screen-label=\"Week 2 Lesson 6 — Solar Energy Pros and Cons\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 2 · Lesson 6 · Solar Energy — Pros &amp; Cons<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:62px;color:var(--white);line-height:1.18;\">Solar Energy —<br>Pros &amp; Cons<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">Would solar panels work well where you live? What would be the advantages and challenges?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>efficient<\u002Fstrong> — producing results with little waste of time or energy<\u002Fli>\n          <li><strong>disadvantage<\u002Fstrong> — a feature that makes something less useful or effective<\u002Fli>\n          <li><strong>generate<\u002Fstrong> — to produce or create something, especially energy<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — prefix: <em style=\"color:var(--white);\">dis-<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">dis·ad·van·tage &nbsp;&nbsp; dis·con·nect &nbsp;&nbsp; dis·a·gree<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\"><strong style=\"color:var(--white);\">dis-<\u002Fstrong> means \"not\" or \"opposite.\" Write two more dis- words.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W2L6 B -->\n<section data-label=\"W2·L6–B\" data-screen-label=\"Week 2 Lesson 6 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 2 · Lesson 6 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Fix-it <span style=\"color:#c0392b;font-size:15px;\">(3 errors)<\u002Fspan><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.55;margin-bottom:12px;\">\"Solar energy dont work when the sky are cloudy or at Night.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Find and fix 3 errors. Look for: verb forms, subject-verb agreement, capital letters.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"One advantage of solar energy is…\" &nbsp;|&nbsp; \"A disadvantage is that…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>Solar energy is clean, free and available across most of the world. Once panels are installed, they need little maintenance and produce no greenhouse gases. However, solar panels only generate electricity when sunlight is available — not at night or on heavily overcast days. They are costly to manufacture, and large arrays require significant land area. Despite these challenges, solar energy is one of the fastest-growing energy sources in the world today.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Complete a <strong>2-column table<\u002Fstrong>: Advantages | Disadvantages of solar energy. List 2 of each.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Body Paragraph<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Draft your <strong>solar energy body paragraph<\u002Fstrong>: topic sentence + 2 details + closing sentence.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Write a persuasive argument — should your school install solar panels?<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W3L7 A -->\n<section data-label=\"W3·L7\" data-screen-label=\"Week 3 Lesson 7 — What is Wind Energy?\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 3 · Lesson 7 · What is Wind Energy?<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:68px;color:var(--white);line-height:1.18;\">What is Wind Energy?<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">Have you ever seen a wind turbine? What did it look like? Where was it?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>turbine<\u002Fstrong> — a machine with spinning blades used to generate electricity<\u002Fli>\n          <li><strong>wind farm<\u002Fstrong> — a group of wind turbines built in one location<\u002Fli>\n          <li><strong>kinetic energy<\u002Fstrong> — the energy an object has because of its movement<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — suffix: <em style=\"color:var(--white);\">-ation<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">ro·ta·tion &nbsp;&nbsp; gen·er·a·tion &nbsp;&nbsp; lo·ca·tion<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\">Remove <strong style=\"color:var(--white);\">-ation<\u002Fstrong> from each word. What verb root is left?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W3L7 B -->\n<section data-label=\"W3·L7–B\" data-screen-label=\"Week 3 Lesson 7 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 3 · Lesson 7 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Analyse<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.5;margin-bottom:12px;\">\"Wind turbines harness the kinetic energy of moving air to generate clean electricity.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Identify the verb group. Circle the technical terms. What is the purpose of \"to generate…\"?<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"Wind energy is produced when…\" &nbsp;|&nbsp; \"Wind turbines are used to…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>Wind is moving air. When the sun heats the Earth's surface unevenly, warm air rises and cooler air rushes in to replace it — creating wind. This moving air carries kinetic energy: the energy of movement. Humans have used wind energy for thousands of years in windmills. Today, modern wind turbines convert the kinetic energy of moving air into electricity, making wind one of the most affordable clean energy sources available anywhere in the world.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">In your workbook: <strong>What is wind energy?<\u002Fstrong> How is wind formed? Write in your own words.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Glossary<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Add <em>turbine<\u002Fem>, <em>kinetic energy<\u002Fem> and <em>wind farm<\u002Fem> to your Glossary Doc.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Research the world's largest wind farm. Report 3 facts about it.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W3L8 A -->\n<section data-label=\"W3·L8\" data-screen-label=\"Week 3 Lesson 8 — How Wind Turbines Work\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 3 · Lesson 8 · How Wind Turbines Work<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:64px;color:var(--white);line-height:1.18;\">How Wind<br>Turbines Work<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">Why might wind turbines built at sea produce more electricity than those on land?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>generator<\u002Fstrong> — a machine that converts movement into electricity<\u002Fli>\n          <li><strong>offshore<\u002Fstrong> — located in or on the sea, away from the coast<\u002Fli>\n          <li><strong>rotation<\u002Fstrong> — movement in a circle around a central point<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — suffix: <em style=\"color:var(--white);\">-or<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">gen·er·a·tor &nbsp;&nbsp; con·duc·tor &nbsp;&nbsp; in·ven·tor<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\"><strong style=\"color:var(--white);\">-or<\u002Fstrong> means \"a person or thing that does.\" Add one more -or word.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W3L8 B -->\n<section data-label=\"W3·L8–B\" data-screen-label=\"Week 3 Lesson 8 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 3 · Lesson 8 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Combine<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.5;margin-bottom:10px;\">\"Wind farms have many turbines.\"<br>\"They are built in open, windy areas.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Use <em>which<\u002Fem> to join these into a relative clause sentence.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"A wind turbine generates electricity by…\" &nbsp;|&nbsp; \"The spinning blades…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>A wind turbine works like a giant fan in reverse: instead of using electricity to make wind, it uses wind to make electricity. Wind pushes the turbine's large blades, spinning a shaft connected to a generator that converts the movement into electricity. Turbines can be built onshore or offshore — offshore wind farms often produce more power because sea winds are stronger and more consistent. A single large turbine can power hundreds of homes.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Explain in <strong>2–3 sentences<\u002Fstrong> how a wind turbine generates electricity. Use the word <em>generator<\u002Fem>.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Topic Sentence<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Write a <strong>topic sentence<\u002Fstrong> about wind energy for your report body paragraph.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Explain why offshore wind farms are generally more efficient than onshore ones.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W3L9 A -->\n<section data-label=\"W3·L9\" data-screen-label=\"Week 3 Lesson 9 — Wind Energy Pros and Cons\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 3 · Lesson 9 · Wind Energy — Pros &amp; Cons<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:62px;color:var(--white);line-height:1.18;\">Wind Energy —<br>Pros &amp; Cons<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">Imagine you are a farmer. Would you want a wind turbine on your land? What would be good and bad about it?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>intermittent<\u002Fstrong> — not continuous; stopping and starting at irregular intervals<\u002Fli>\n          <li><strong>consistent<\u002Fstrong> — happening at the same rate or level without much variation<\u002Fli>\n          <li><strong>transmission<\u002Fstrong> — the process of sending electricity through power lines<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — suffix: <em style=\"color:var(--white);\">-ent<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">in·ter·mit·tent &nbsp;&nbsp; con·sis·tent &nbsp;&nbsp; ef·fi·cient<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\">What do these three words have in common? Add one more <strong style=\"color:var(--white);\">-ent<\u002Fstrong> word.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W3L9 B -->\n<section data-label=\"W3·L9–B\" data-screen-label=\"Week 3 Lesson 9 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 3 · Lesson 9 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Fix-it <span style=\"color:#c0392b;font-size:15px;\">(3 errors)<\u002Fspan><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.55;margin-bottom:12px;\">\"Wind energy are intermittent because the wind doesnt always blows.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Find and fix 3 errors. Look for: verb agreement, apostrophe, verb form.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"One advantage of wind energy is…\" &nbsp;|&nbsp; \"However, wind energy can be…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>Wind energy is clean and emits no greenhouse gases. It is among the cheapest sources of new electricity in many countries, and once turbines are installed, the wind is free. However, wind is intermittent — turbines only generate power when wind blows at the right speed. Some communities object to turbines because of noise or visual impact on the landscape. Wind farms also require significant land or sea area to operate effectively.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Complete your <strong>Advantages / Disadvantages table<\u002Fstrong> for wind energy. List 2 of each.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Body Paragraph<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Draft your <strong>wind energy body paragraph<\u002Fstrong>: topic sentence + 2 details + closing sentence.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Write a letter to a local council recommending wind energy for your community.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W4L10 A -->\n<section data-label=\"W4·L10\" data-screen-label=\"Week 4 Lesson 10 — What is Hydropower?\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 4 · Lesson 10 · What is Hydropower?<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:68px;color:var(--white);line-height:1.18;\">What is Hydropower?<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">Have you ever stood near a waterfall or fast-moving river? Where does all that power come from?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>hydropower<\u002Fstrong> — electricity generated from the energy of moving water<\u002Fli>\n          <li><strong>dam<\u002Fstrong> — a barrier built across a river to hold back water<\u002Fli>\n          <li><strong>reservoir<\u002Fstrong> — a large artificial lake used to store water<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — prefix: <em style=\"color:var(--white);\">hydro-<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">hy·dro·pow·er &nbsp;&nbsp; hy·dro·e·lec·tric &nbsp;&nbsp; hy·dro·gen<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\"><strong style=\"color:var(--white);\">hydro-<\u002Fstrong> = water in Greek. How does each word connect to water?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W4L10 B -->\n<section data-label=\"W4·L10–B\" data-screen-label=\"Week 4 Lesson 10 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 4 · Lesson 10 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Analyse<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.5;margin-bottom:12px;\">\"Hydropower stations use the gravitational potential energy of water stored in large reservoirs.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Identify the noun groups. Underline the adjectives. Circle the technical vocabulary.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"Hydropower works by…\" &nbsp;|&nbsp; \"Water stored in a reservoir…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>Hydropower uses the energy of flowing or falling water to generate electricity. When rain falls on mountains, water flows downhill carrying enormous kinetic energy. Hydropower stations capture this by building a dam across a river to form a reservoir. Water stored behind the dam is released in a controlled flow through turbines, which spin generators to produce electricity. Hydropower provides about 16% of the world's electricity and is one of our most established renewable sources.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">In your workbook: <strong>What is hydropower?<\u002Fstrong> How is it produced? Give 2 facts from the reading.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Glossary<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Add <em>hydropower<\u002Fem>, <em>dam<\u002Fem> and <em>reservoir<\u002Fem> to your Glossary Doc.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Research which country generates the most hydropower and explain why.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W4L11 A -->\n<section data-label=\"W4·L11\" data-screen-label=\"Week 4 Lesson 11 — How Hydro Dams Work\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 4 · Lesson 11 · How Hydro Dams Work<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:64px;color:var(--white);line-height:1.18;\">How Hydro<br>Dams Work<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">Why does water stored high up behind a dam have more energy than water at the bottom?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>potential energy<\u002Fstrong> — stored energy an object has because of its position<\u002Fli>\n          <li><strong>penstock<\u002Fstrong> — a large pipe that carries water from a reservoir to the turbines<\u002Fli>\n          <li><strong>gravitational<\u002Fstrong> — relating to the force of gravity that pulls objects downward<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — suffix: <em style=\"color:var(--white);\">-al<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">grav·i·ta·tion·al &nbsp;&nbsp; e·lec·tric·al &nbsp;&nbsp; po·ten·tial<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\"><strong style=\"color:var(--white);\">-al<\u002Fstrong> turns a noun into an adjective. Find the noun inside each word.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W4L11 B -->\n<section data-label=\"W4·L11–B\" data-screen-label=\"Week 4 Lesson 11 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 4 · Lesson 11 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Combine<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.5;margin-bottom:10px;\">\"Water flows down through the dam.\"<br>\"It spins a turbine.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Join using <em>as<\u002Fem> to show the two things happen at the same time.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"A hydroelectric dam generates electricity by…\" &nbsp;|&nbsp; \"Water flowing through the dam…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>Inside a hydroelectric dam, water in the reservoir holds potential energy — stored energy from its height above the turbines. When released, it flows down large pipes called penstocks, building speed as it falls. The fast-moving water spins turbines connected to generators, which convert the movement into electricity. The power travels through transmission lines to homes and businesses. After passing through the turbines, the water flows on down the river as normal.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Write a <strong>topic sentence<\u002Fstrong> about how hydro dams work. Include the term <em>potential energy<\u002Fem>.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Body Paragraph<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Start drafting your <strong>hydropower body paragraph<\u002Fstrong> — begin with your topic sentence.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Draw a labelled cross-section diagram of a hydroelectric dam.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W4L12 A -->\n<section data-label=\"W4·L12\" data-screen-label=\"Week 4 Lesson 12 — Hydropower Pros and Cons\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 4 · Lesson 12 · Hydropower — Pros &amp; Cons<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:62px;color:var(--white);line-height:1.18;\">Hydropower —<br>Pros &amp; Cons<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">Imagine a dam is going to be built near your town. Who might be affected? What are the good and bad sides?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>habitat<\u002Fstrong> — the natural environment where an organism lives and grows<\u002Fli>\n          <li><strong>displacement<\u002Fstrong> — being forced to move away from your home or environment<\u002Fli>\n          <li><strong>ecosystem<\u002Fstrong> — all the living things in an area and how they interact<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — suffix: <em style=\"color:var(--white);\">-ment<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">dis·place·ment &nbsp;&nbsp; en·vi·ron·ment &nbsp;&nbsp; move·ment<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\"><strong style=\"color:var(--white);\">-ment<\u002Fstrong> turns a verb into a noun. Find the verb inside each word.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W4L12 B -->\n<section data-label=\"W4·L12–B\" data-screen-label=\"Week 4 Lesson 12 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 4 · Lesson 12 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Fix-it <span style=\"color:#c0392b;font-size:15px;\">(3 errors)<\u002Fspan><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.55;margin-bottom:12px;\">\"building a dam can effect the habitat of fish and other wildlif in the river.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Find and fix 3 errors. Look for: capital letter, affect/effect, spelling.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"One disadvantage of hydropower is…\" &nbsp;|&nbsp; \"Building a dam can affect…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>Hydropower is reliable and well-established — unlike solar or wind, it can generate electricity at any hour as long as water flows. Large dams can store huge amounts of energy and respond quickly to changes in demand. However, building dams has environmental costs: they flood large areas, destroy habitats and can block fish migration. Engineers today design smaller, more environmentally sensitive hydro systems to reduce these impacts wherever possible.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Complete your <strong>Advantages / Disadvantages table<\u002Fstrong> for hydropower. Add 2 of each.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Body Paragraph<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Complete your <strong>hydropower body paragraph<\u002Fstrong>. Include one advantage and one disadvantage.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Research the Three Gorges Dam. Write 3 interesting facts about it.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W5L13 A -->\n<section data-label=\"W5·L13\" data-screen-label=\"Week 5 Lesson 13 — What is Geothermal Energy?\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 5 · Lesson 13 · What is Geothermal Energy?<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:60px;color:var(--white);line-height:1.18;\">What is Geothermal<br>Energy?<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">Did you know the Earth's core is hotter than the surface of the sun? What could that heat be used for?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>geothermal<\u002Fstrong> — relating to the heat produced inside the Earth<\u002Fli>\n          <li><strong>magma<\u002Fstrong> — molten rock found beneath the Earth's crust<\u002Fli>\n          <li><strong>geologist<\u002Fstrong> — a scientist who studies the structure and materials of the Earth<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — prefix: <em style=\"color:var(--white);\">geo-<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">ge·o·ther·mal &nbsp;&nbsp; ge·ol·o·gy &nbsp;&nbsp; ge·og·ra·phy<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\"><strong style=\"color:var(--white);\">geo-<\u002Fstrong> = Earth in Greek. How does each word relate to the Earth?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W5L13 B -->\n<section data-label=\"W5·L13–B\" data-screen-label=\"Week 5 Lesson 13 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 5 · Lesson 13 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Analyse<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.5;margin-bottom:12px;\">\"Geothermal energy taps into the immense heat stored deep within the Earth's crust.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Find the prepositional phrase. Identify the adjective. Circle the technical vocab.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"Geothermal energy comes from…\" &nbsp;|&nbsp; \"The heat inside the Earth is…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>Geothermal energy comes from heat stored deep within the Earth. The Earth's core reaches around 5,000°C. This heat moves slowly outward, and in places where the crust is thin or cracked, it escapes more easily — forming hot springs and geysers. Countries like Iceland and New Zealand, which sit on geologically active zones, use this heat to generate electricity and to warm homes and buildings directly throughout the year.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">In your workbook: <strong>What is geothermal energy?<\u002Fstrong> Where does it come from? Give 2 facts.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Glossary<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Add <em>geothermal<\u002Fem>, <em>magma<\u002Fem> and <em>geologist<\u002Fem> to your Glossary Doc.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Which country gets the most energy from geothermal sources? Research and explain why.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W5L14 A -->\n<section data-label=\"W5·L14\" data-screen-label=\"Week 5 Lesson 14 — How Geothermal Plants Work\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 5 · Lesson 14 · How Geothermal Plants Work<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:60px;color:var(--white);line-height:1.18;\">How Geothermal<br>Plants Work<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">If you could drill a well anywhere to access geothermal energy, where would you choose? Why?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>geyser<\u002Fstrong> — a hot spring that regularly shoots steam and water into the air<\u002Fli>\n          <li><strong>steam<\u002Fstrong> — water in gas form, produced when water is heated to boiling point<\u002Fli>\n          <li><strong>drill<\u002Fstrong> — to bore deep holes into the Earth's surface to reach hot water<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — suffix: <em style=\"color:var(--white);\">-ist<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">ge·ol·o·gist &nbsp;&nbsp; sci·en·tist &nbsp;&nbsp; spe·cial·ist<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\"><strong style=\"color:var(--white);\">-ist<\u002Fstrong> = \"a person who.\" What does each person study or do?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W5L14 B -->\n<section data-label=\"W5·L14–B\" data-screen-label=\"Week 5 Lesson 14 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 5 · Lesson 14 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Combine<\u002Fdiv>\
