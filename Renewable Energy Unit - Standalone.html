n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.5;margin-bottom:10px;\">\"Steam rises from underground.\"<br>\"It powers a generator.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Use a participial phrase — start with \"Steam rising from underground…\"<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"Geothermal plants work by…\" &nbsp;|&nbsp; \"Engineers drill wells to…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>To harness geothermal energy, engineers drill deep wells into the Earth's crust. Hot water and steam rise through these wells from underground reservoirs. The steam spins turbines connected to generators, producing electricity. After cooling, the water is pumped back underground to be reheated — making the process very efficient. Where steam is not hot enough for electricity, heat pumps still extract warmth to heat buildings. Geothermal plants run continuously, day and night, regardless of weather conditions.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Write a <strong>topic sentence<\u002Fstrong> about how geothermal plants work. Include the word <em>steam<\u002Fem>.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Body Paragraph<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Start drafting your <strong>geothermal body paragraph<\u002Fstrong> — begin with your topic sentence.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Find out why Iceland can use geothermal energy so effectively.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W5L15 A -->\n<section data-label=\"W5·L15\" data-screen-label=\"Week 5 Lesson 15 — Geothermal Pros and Cons\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 5 · Lesson 15 · Geothermal Energy — Pros &amp; Cons<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:60px;color:var(--white);line-height:1.18;\">Geothermal Energy —<br>Pros &amp; Cons<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">Geothermal energy works 24 hours a day. Why is that a big advantage over solar and wind energy?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>limited<\u002Fstrong> — restricted to certain places or amounts; not available everywhere<\u002Fli>\n          <li><strong>volcanic<\u002Fstrong> — relating to or produced by a volcano or volcanic activity<\u002Fli>\n          <li><strong>harness<\u002Fstrong> — to capture and control a natural force to use as energy<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — suffix: <em style=\"color:var(--white);\">-ic<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">vol·can·ic &nbsp;&nbsp; ge·o·ther·mic &nbsp;&nbsp; ge·o·graph·ic<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\"><strong style=\"color:var(--white);\">-ic<\u002Fstrong> makes adjectives from nouns. What noun does each come from?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W5L15 B -->\n<section data-label=\"W5·L15–B\" data-screen-label=\"Week 5 Lesson 15 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 5 · Lesson 15 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Fix-it <span style=\"color:#c0392b;font-size:15px;\">(4 errors)<\u002Fspan><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.55;margin-bottom:12px;\">\"geothermal energy is only availible in places were there are volcanic activity.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Find and fix 4 errors. Look for: capital letter, spelling, where/were, verb agreement.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"An advantage of geothermal energy is…\" &nbsp;|&nbsp; \"This energy type is limited to…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>Geothermal energy is highly reliable — it runs 24 hours a day — and has a small land footprint compared to solar or wind farms. It produces very low emissions and is cost-effective once built. However, it can only be developed efficiently in areas with volcanic or tectonic activity. Drilling deep wells is expensive, and there is a small risk of triggering minor earthquakes. Despite these limits, it is a valuable part of many nations' renewable energy mix.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Complete your <strong>Advantages / Disadvantages table<\u002Fstrong> for geothermal energy. Add 2 of each.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Body Paragraph<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Complete your <strong>geothermal body paragraph<\u002Fstrong>. Include one advantage and one disadvantage.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Compare geothermal energy with one other renewable source of your choice.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W6L16 A -->\n<section data-label=\"W6·L16\" data-screen-label=\"Week 6 Lesson 16 — What is Tidal Energy?\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 6 · Lesson 16 · What is Tidal Energy?<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:68px;color:var(--white);line-height:1.18;\">What is Tidal Energy?<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">Have you ever watched the tide come in and go out at a beach? What do you think causes that?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>tidal<\u002Fstrong> — relating to the regular rise and fall of sea levels caused by the Moon<\u002Fli>\n          <li><strong>gravitational pull<\u002Fstrong> — the force of gravity attracting one large object toward another<\u002Fli>\n          <li><strong>predictable<\u002Fstrong> — able to be known or expected in advance with certainty<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — suffixes: <em style=\"color:var(--white);\">-able / -ible<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">pre·dict·a·ble &nbsp;&nbsp; re·li·a·ble &nbsp;&nbsp; pos·si·ble<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\">Which words use <strong style=\"color:var(--white);\">-able<\u002Fstrong> and which <strong style=\"color:var(--white);\">-ible<\u002Fstrong>? Can you find a rule?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W6L16 B -->\n<section data-label=\"W6·L16–B\" data-screen-label=\"Week 6 Lesson 16 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 6 · Lesson 16 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Analyse<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.5;margin-bottom:12px;\">\"The Moon's gravitational pull causes ocean tides, which rise and fall twice each day.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Identify the relative clause. Underline the cause-and-effect language.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"Tidal energy is caused by…\" &nbsp;|&nbsp; \"An advantage of tidal energy is…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>Tidal energy uses the power of ocean tides to generate electricity. Tides are caused by the Moon's gravitational pull on Earth's oceans. As the Moon orbits, its gravity pulls ocean water toward it, creating a high tide. As the Earth rotates, this bulge moves around the planet, producing the regular rise and fall of tides. Unlike solar and wind energy, tides are highly predictable — we can know exactly when they will occur years in advance.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">In your workbook: <strong>What is tidal energy?<\u002Fstrong> What causes it? Why is it predictable?<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Glossary<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Add <em>tidal<\u002Fem>, <em>gravitational pull<\u002Fem> and <em>predictable<\u002Fem> to your Glossary Doc.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Explain why tidal energy is more predictable than solar or wind energy.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W6L17 A -->\n<section data-label=\"W6·L17\" data-screen-label=\"Week 6 Lesson 17 — How Tidal Energy is Captured\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 6 · Lesson 17 · How Tidal Energy is Captured<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:60px;color:var(--white);line-height:1.18;\">How Tidal Energy<br>is Captured<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">A tidal barrage is like a dam but uses tides. What challenges might come with building one across a river mouth?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>tidal barrage<\u002Fstrong> — a dam-like structure built across a tidal estuary to capture energy<\u002Fli>\n          <li><strong>estuary<\u002Fstrong> — the wide mouth of a river where it meets the sea<\u002Fli>\n          <li><strong>tidal stream generator<\u002Fstrong> — an underwater turbine placed in areas of strong tidal current<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — suffix: <em style=\"color:var(--white);\">-ary<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">es·tu·ar·y &nbsp;&nbsp; pri·mar·y &nbsp;&nbsp; sec·on·dar·y<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\">These all end in <strong style=\"color:var(--white);\">-ary<\u002Fstrong>. Add two more words that use this ending.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W6L17 B -->\n<section data-label=\"W6·L17–B\" data-screen-label=\"Week 6 Lesson 17 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 6 · Lesson 17 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Combine<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.5;margin-bottom:10px;\">\"Tidal barrages are built across estuaries.\"<br>\"They capture the energy of rising and falling tides.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Use a participial phrase: \"Tidal barrages, built across estuaries, …\"<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"A tidal barrage captures energy by…\" &nbsp;|&nbsp; \"Tidal stream generators work like…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>There are two main ways to capture tidal energy. A tidal barrage is a dam-like structure built across an estuary. As tides rise and fall, water flows through tunnels in the barrage, spinning turbines. Alternatively, tidal stream generators — turbines placed on the seabed — work like underwater wind turbines in areas of strong tidal currents. Tidal energy is still developing, but holds enormous potential for coastal nations with large tidal ranges.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Write a <strong>topic sentence<\u002Fstrong> about how tidal energy is captured. Use <em>barrage<\u002Fem> or <em>estuary<\u002Fem>.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Body Paragraph<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Start drafting your <strong>tidal energy body paragraph<\u002Fstrong>. Begin with your topic sentence.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Research one real tidal energy project in the world. Write a short summary.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W6L18 A -->\n<section data-label=\"W6·L18\" data-screen-label=\"Week 6 Lesson 18 — Comparing All Five Energy Types\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 6 · Lesson 18 · Comparing All Five Energy Types<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:60px;color:var(--white);line-height:1.18;\">Comparing All<br>Five Energy Types<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">If you were advising Australia on which renewable energy to invest in, which would you choose and why?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>compare<\u002Fstrong> — to examine the similarities and differences between things<\u002Fli>\n          <li><strong>contrast<\u002Fstrong> — to highlight the differences between two or more things<\u002Fli>\n          <li><strong>advantage<\u002Fstrong> — a positive feature or benefit of something<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — prefix: <em style=\"color:var(--white);\">ad-<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">ad·van·tage &nbsp;&nbsp; ad·apt &nbsp;&nbsp; ad·vance<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\"><strong style=\"color:var(--white);\">ad-<\u002Fstrong> means \"toward.\" Write two more words starting with <strong style=\"color:var(--white);\">ad-<\u002Fstrong>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W6L18 B -->\n<section data-label=\"W6·L18–B\" data-screen-label=\"Week 6 Lesson 18 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 6 · Lesson 18 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Fix-it <span style=\"color:#c0392b;font-size:15px;\">(4 errors)<\u002Fspan><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.55;margin-bottom:12px;\">\"All five renewable energy types has advantage and disadvantage that make them suiteble for diffrent places.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Find and fix 4 errors. Look for: verb agreement, plurals, spelling (×2).<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"Solar energy is best suited to…\" &nbsp;|&nbsp; \"The main difference between [X] and [Y] is…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>We have now studied five renewable energy sources: solar, wind, hydro, geothermal and tidal. Each works best in different locations: solar in sunny regions, wind in open areas, hydro near strong rivers, geothermal near volcanic zones and tidal along coastlines with large tidal ranges. No single source can meet all our needs. Energy experts recommend a \"renewable energy mix\" — combining multiple sources for reliable, clean electricity supply.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Complete your <strong>Comparison Table<\u002Fstrong> for all 5 types: How it works / Advantage / Disadvantage / Best location.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Review<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Review and complete all five body paragraph <strong>topic sentences<\u002Fstrong>. Share with your teacher for feedback.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Create an infographic comparing two energy types.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W7L19 A -->\n<section data-label=\"W7·L19\" data-screen-label=\"Week 7 Lesson 19 — Information Report Structure\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 7 · Lesson 19 · Information Report Structure<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:60px;color:var(--white);line-height:1.18;\">Information Report<br>Structure<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">What do you already know about information reports? What sections do they usually have?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>introduction<\u002Fstrong> — the opening section that defines and contextualises the topic<\u002Fli>\n          <li><strong>general statement<\u002Fstrong> — a broad opening sentence that defines or classifies the topic<\u002Fli>\n          <li><strong>technical language<\u002Fstrong> — specialist words used for a particular subject area<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — prefix: <em style=\"color:var(--white);\">intro-<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">in·tro·duc·tion &nbsp;&nbsp; in·tro·duce &nbsp;&nbsp; in·tro·vert<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\"><strong style=\"color:var(--white);\">intro-<\u002Fstrong> means \"into.\" How does this apply to each word?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W7L19 B -->\n<section data-label=\"W7·L19–B\" data-screen-label=\"Week 7 Lesson 19 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 7 · Lesson 19 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Analyse<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.5;margin-bottom:12px;\">\"Renewable energy is a broad term that describes any energy source naturally replenished by the environment.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Identify the defining relative clause. What does it do? Circle the technical language.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"An information report is a type of writing that…\" &nbsp;|&nbsp; \"The three main sections are…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>An information report presents facts about a topic clearly and objectively. It uses technical language and is written in the present tense with formal language. A typical information report has three parts: an introduction that defines the topic; body paragraphs explaining different aspects in detail; and a conclusion that sums up the key points. Understanding this structure will help you plan and write your own report on renewable energy.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Draw the <strong>3-part structure<\u002Fstrong> of an information report with labels: Introduction / Body / Conclusion.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Planning<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Use your notes to list the <strong>sections you will include<\u002Fstrong> in your report. Show your plan to your teacher.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Find a published information report. Identify its intro, body and conclusion.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W7L20 A -->\n<section data-label=\"W7·L20\" data-screen-label=\"Week 7 Lesson 20 — Writing an Introduction\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 7 · Lesson 20 · Writing an Introduction<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:64px;color:var(--white);line-height:1.18;\">Writing an<br>Introduction<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">What should the very first sentence of your report do? Why does it matter so much?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>paragraph<\u002Fstrong> — a group of sentences about one connected idea<\u002Fli>\n          <li><strong>topic sentence<\u002Fstrong> — the opening sentence of a paragraph, stating the main idea<\u002Fli>\n          <li><strong>elaboration<\u002Fstrong> — adding more detail, examples or explanation to support an idea<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — suffix: <em style=\"color:var(--white);\">-tion<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">in·tro·duc·tion &nbsp;&nbsp; el·ab·or·a·tion &nbsp;&nbsp; in·for·ma·tion<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\">Remove <strong style=\"color:var(--white);\">-tion<\u002Fstrong> from each word. What verb is left?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W7L20 B -->\n<section data-label=\"W7·L20–B\" data-screen-label=\"Week 7 Lesson 20 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 7 · Lesson 20 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Combine<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.5;margin-bottom:10px;\">\"Solar energy is clean.\"<br>\"It does not produce harmful gases.\"<br>\"It can be used wherever the sun shines.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Join all three into one fluent sentence.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"Renewable energy is a broad term that…\" &nbsp;|&nbsp; \"In this report, I will discuss…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>The introduction of an information report tells the reader what the report is about. A strong introduction begins with a general statement — for example: \"Renewable energy is energy drawn from sources that are naturally replenished.\" It then provides brief background context. Introductions should be clear and direct — two to four sentences is sufficient. Do not include personal opinion; use formal, objective language. A well-written introduction makes the reader want to read on.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Identify the <strong>general statement<\u002Fstrong> in a model introduction provided by your teacher. What makes it effective?<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Draft Introduction<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Draft your <strong>introduction<\u002Fstrong> (3–4 sentences): general statement + background + topics to be covered.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Read a published information report and evaluate the strength of its introduction.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W7L21 A -->\n<section data-label=\"W7·L21\" data-screen-label=\"Week 7 Lesson 21 — Writing Body Paragraphs\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 7 · Lesson 21 · Writing Body Paragraphs<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:62px;color:var(--white);line-height:1.18;\">Writing Body<br>Paragraphs<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">Why do we need body paragraphs in an information report? What makes a body paragraph \"strong\"?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>conclusion<\u002Fstrong> — the closing section that summarises the key points of a report<\u002Fli>\n          <li><strong>summarise<\u002Fstrong> — to give the main points of something briefly and clearly<\u002Fli>\n          <li><strong>evidence<\u002Fstrong> — facts or information that support a claim or argument<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — prefix: <em style=\"color:var(--white);\">con-<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">con·clu·sion &nbsp;&nbsp; com·pare &nbsp;&nbsp; con·trast<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\"><strong style=\"color:var(--white);\">con-<\u002Fstrong> means \"together\" or \"with.\" How does this apply to each word?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W7L21 B -->\n<section data-label=\"W7·L21–B\" data-screen-label=\"Week 7 Lesson 21 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 7 · Lesson 21 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Fix-it <span style=\"color:#c0392b;font-size:15px;\">(4 errors)<\u002Fspan><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.55;margin-bottom:12px;\">\"in conclusion renewable energy sources are important because it help us reduce our reliance of fossil fuels.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Find and fix 4 errors. Look for: capital letter, missing comma, pronoun, preposition.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"One type of renewable energy is… It works by…\" &nbsp;|&nbsp; \"A key advantage of [X] is…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>Body paragraphs form the main part of an information report. Each paragraph focuses on one subtopic and opens with a topic sentence — a sentence telling the reader what the paragraph is about. This is followed by elaboration: facts, explanations and examples. Technical vocabulary should be used accurately. Paragraphs end with a linking sentence. Think of each body paragraph as a mini-report with a clear beginning, middle and end.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Note-taking<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Practise writing one body paragraph using the <strong>TEEL structure<\u002Fstrong>: Topic sentence → Evidence → Explanation → Link.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Draft Paragraph<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Draft your <strong>solar energy body paragraph<\u002Fstrong> in full. Share with your teacher for feedback before Week 8.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Write a second body paragraph about another energy type of your choice.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W8L22 A -->\n<section data-label=\"W8·L22\" data-screen-label=\"Week 8 Lesson 22 — Using the InfoReport Tool\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 8 · Lesson 22 · Using the InfoReport Tool<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:60px;color:var(--white);line-height:1.18;\">Using the<br>InfoReport Tool<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">What would you want a reader to know about renewable energy after reading your report? What is the most important message?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>structure<\u002Fstrong> — the way a piece of writing is organised into sections<\u002Fli>\n          <li><strong>heading<\u002Fstrong> — a title that introduces a section of writing<\u002Fli>\n          <li><strong>subheading<\u002Fstrong> — a smaller title that introduces a subsection within a section<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — suffix: <em style=\"color:var(--white);\">-ing<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">head·ing &nbsp;&nbsp; writ·ing &nbsp;&nbsp; or·gan·is·ing<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\">Does the root word change when you add <strong style=\"color:var(--white);\">-ing<\u002Fstrong>? Find the rule for each.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W8L22 B -->\n<section data-label=\"W8·L22–B\" data-screen-label=\"Week 8 Lesson 22 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 8 · Lesson 22 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Analyse<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.5;margin-bottom:12px;\">\"An information report begins with a general statement that defines or classifies the topic for the reader.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> What is the purpose of this sentence? Identify the defining relative clause.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"Renewable energy is energy that…\" &nbsp;|&nbsp; \"This report will discuss…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>Today you begin using the InfoReport tool to write your report on renewable energy. Read each prompt carefully and use your notes from your workbook. You have studied solar, wind, hydro, geothermal and tidal energy over seven weeks. Write in the present tense, use formal language and include technical vocabulary from your glossary. Take care with your introduction — it sets the tone for your whole report.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Open the Tool<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.6;\">Open in your browser:<br><strong style=\"font-size:22px;color:var(--teal);\">planomy.github.io/inforeport<\u002Fstrong><\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Introduction<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Type your <strong>introduction<\u002Fstrong> into the InfoReport tool. Use your draft from Lesson 20.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Add an extra section about the future of renewable energy.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W8L23 A -->\n<section data-label=\"W8·L23\" data-screen-label=\"Week 8 Lesson 23 — Drafting Body Sections\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 8 · Lesson 23 · Drafting Body Sections<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:64px;color:var(--white);line-height:1.18;\">Drafting Body<br>Sections<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">Think back over 7 weeks. What is the most interesting thing you discovered about renewable energy?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>draft<\u002Fstrong> — an early version of a piece of writing, not yet finished or polished<\u002Fli>\n          <li><strong>revise<\u002Fstrong> — to read through and improve a piece of writing<\u002Fli>\n          <li><strong>proofread<\u002Fstrong> — to check a piece of writing carefully for errors<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — prefix: <em style=\"color:var(--white);\">re-<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">re·vise &nbsp;&nbsp; re·write &nbsp;&nbsp; re·view<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\">All use <strong style=\"color:var(--white);\">re-<\u002Fstrong> meaning \"again.\" What is the action of each word?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W8L23 B -->\n<section data-label=\"W8·L23–B\" data-screen-label=\"Week 8 Lesson 23 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 8 · Lesson 23 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Combine<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.5;margin-bottom:10px;\">\"Solar energy uses sunlight.\"<br>\"Wind energy uses moving air.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Use a contrast connector — start with \"While solar energy uses sunlight, …\"<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"[Energy type] is a form of renewable energy that…\" &nbsp;|&nbsp; \"One advantage is… However, one disadvantage is…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>Your body sections are the heart of your report. Each section covers one energy type. Begin with a clear topic sentence, then elaborate — explain how it works, where it is used, and its advantages and disadvantages. Use evidence from your reading passages and technical vocabulary from your glossary. Each section should include: a topic sentence, at least two supporting details and a closing sentence.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Self-check<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Check each body section: <strong>topic sentence ✓&nbsp; 2 details ✓&nbsp; closing sentence ✓<\u002Fstrong>. Fix any missing parts.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Body Sections<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Complete <strong>all five body sections<\u002Fstrong> in the InfoReport tool using your notes and paragraph drafts.<\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Include statistics and data in at least two of your body sections.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W8L24 A -->\n<section data-label=\"W8·L24\" data-screen-label=\"Week 8 Lesson 24 — Reviewing and Publishing\" style=\"width:100%;height:100%;background:var(--teal);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 8 · Lesson 24 · Reviewing &amp; Publishing Your Report<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-a\">\n    <div class=\"left-a\">\n      <div>\n        <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:14px;\">Lesson Focus<\u002Fdiv>\n        <h1 style=\"font-family:var(--serif);font-size:56px;color:var(--white);line-height:1.2;\">Reviewing &amp;<br>Publishing<br>Your Report<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"cd\">\n        <div class=\"lbl\">🔥 Warm-up — discuss with your teacher<\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;color:var(--white);line-height:1.55;\">If a friend asked \"what is renewable energy?\" — how has your answer grown since Week 1?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"right-a\">\n      <div class=\"cd\" style=\"flex:1;\">\n        <div class=\"lbl\">📖 Word Work — Vocabulary<\u002Fdiv>\n        <ul class=\"vocab\">\n          <li><strong>publish<\u002Fstrong> — to make a piece of writing available for an audience to read<\u002Fli>\n          <li><strong>audience<\u002Fstrong> — the people who will read, watch or listen to a piece of work<\u002Fli>\n          <li><strong>purpose<\u002Fstrong> — the reason a piece of writing was created<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cd\" style=\"background:rgba(92,122,75,.3);border-color:var(--sage-lt);\">\n        <div class=\"lbl\">✏️ Spelling Focus — suffixes: <em style=\"color:var(--white);\">-ence / -ance<\u002Fem><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:28px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:7px;\">au·di·ence &nbsp;&nbsp; ev·i·dence &nbsp;&nbsp; im·por·tance<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--sage-lt);\">When do we use <strong style=\"color:var(--white);\">-ence<\u002Fstrong> and when <strong style=\"color:var(--white);\">-ance<\u002Fstrong>? Add one example of each.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- W8L24 B -->\n<section data-label=\"W8·L24–B\" data-screen-label=\"Week 8 Lesson 24 — Content\" style=\"width:100%;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;\">\n  <div class=\"tb\"><span>Week 8 · Lesson 24 · Content<\u002Fspan><span>Renewable Energy — Year 5<\u002Fspan><\u002Fdiv>\n  <div class=\"body-b\">\n    <div class=\"col-l\">\n      <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--sage);\">\n        <div class=\"lbll\">📝 Sentence Work — Fix-it <span style=\"color:#c0392b;font-size:15px;\">(3 errors)<\u002Fspan><\u002Fdiv>\n        <p style=\"font-family:var(--sans);font-size:24px;color:var(--text);font-style:italic;line-height:1.55;margin-bottom:12px;\">\"The report need to have a clear structure with headings subheadings and paragraphs to helps the reader navigate it.\"<\u002Fp>\n        <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\"><strong>Your turn:<\u002Fstrong> Find and fix 3 errors. Look for: verb agreement, missing commas, verb form.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"starters\"><strong>Starters:<\u002Fstrong> \"In conclusion, renewable energy is important because…\" &nbsp;|&nbsp; \"As this report has shown…\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-r\">\n      <div class=\"reading\">\n        <div style=\"font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-lt);margin-bottom:8px;\">Reading<\u002Fdiv>\n        <p>You are almost finished — well done! Before publishing, review your work carefully. Does your introduction define renewable energy clearly? Are your facts accurate and vocabulary used correctly? Does your conclusion summarise the key points without simply repeating them? Proofread for spelling, punctuation and grammar. When satisfied, publish your report in the InfoReport tool. Your finished report shows everything you have learned over eight weeks — take pride in it!<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bot-row\">\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--teal-mid);\">\n          <div class=\"lbll\">📋 Final Checklist<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:22px;color:var(--text);line-height:1.75;\">✅ Introduction defines renewable energy<br>✅ 5 body sections — one per energy type<br>✅ Conclusion summarises key points<br>✅ Technical vocabulary used correctly<br>✅ Proofread for spelling &amp; grammar<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cl\" style=\"flex:1;border-left:6px solid var(--green);\">\n          <div class=\"lbll\">📄 Report Work — Publish!<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:23px;color:var(--text);line-height:1.5;\">Write your <strong>conclusion<\u002Fstrong>, proofread your report, then <strong>publish<\u002Fstrong> it at:<br><strong style=\"color:var(--teal);\">planomy.github.io/inforeport<\u002Fstrong><\u002Fp>\n          <p class=\"chall\">⭐ Challenge: Peer-review a classmate's report and give two specific improvement suggestions.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
